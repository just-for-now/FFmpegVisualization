<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bellard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W=2560, H=1440;
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cv.width=W; cv.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  cv.style.width=W*s+'px'; cv.style.height=H*s+'px';
}
window.addEventListener('resize',resize); resize();

const C1='#00EEFF';
const C2='#FFB300';
const C3='#FF6B35';
const C4='#FF2244';
const WH='#ffffff';
const BK='#000000';
const DIM='rgba(255,255,255,0.65)';

function ease(x){ return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2; }
function easeOut(x){ return 1-Math.pow(1-x,3); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function ep(t,s,d){ return ease(clamp((t-s)/d,0,1)); }

function scanlines(){
  cx.fillStyle='rgba(0,0,0,0.16)';
  for(let y=0;y<H;y+=4) cx.fillRect(0,y,W,2);
}

function txt(str,x,y,font,color,alpha,align){
  cx.font=font; cx.fillStyle=color;
  cx.globalAlpha=clamp(alpha,0,1);
  cx.textAlign=align||'left';
  cx.fillText(str,x,y);
  cx.globalAlpha=1; cx.textAlign='left';
}

function note(str,x,y,alpha,fs,AC){
  cx.globalAlpha=clamp(alpha,0,1);
  cx.font=`${fs}px 'IBM Plex Mono'`;
  cx.fillStyle=AC;
  const dash='— ';
  const dw=cx.measureText(dash).width;
  cx.fillText(dash,x,y);
  cx.fillStyle=DIM;
  cx.fillText(str,x+dw,y);
  cx.globalAlpha=1;
}

function notes(lines,x,y,alpha,fs,AC){
  const lh=fs*1.65;
  for(let i=0;i<lines.length;i++) note(lines[i],x,y+i*lh,alpha,fs,AC);
}

function infoBlock(title,lines,x,y,alpha,AC){
  if(clamp(alpha,0,1)<=0.01) return;
  const TFS=36, BFS=28, TLH=TFS*1.3, BLH=BFS*1.7, GAP=18, PAD=10;
  const blockH=PAD+TLH+GAP+lines.length*BLH+10;
  cx.globalAlpha=clamp(alpha,0,1);
  cx.fillStyle=AC; cx.fillRect(x,y,3,blockH);
  cx.font=`700 ${TFS}px 'IBM Plex Mono'`;
  cx.fillStyle=AC; cx.fillText(title,x+18,y+PAD+TFS);
  cx.font=`${BFS}px 'IBM Plex Mono'`;
  const by=y+PAD+TLH+GAP+BFS;
  for(let i=0;i<lines.length;i++){
    cx.fillStyle=DIM; cx.fillText(lines[i],x+18,by+i*BLH);
  }
  cx.globalAlpha=1;
}

function sceneHeader(year,award,t,AC){
  txt(year,80,80,`700 46px 'IBM Plex Mono'`,AC,ep(t,0,0.5));
  txt(award,80,138,`28px 'IBM Plex Mono'`,WH,ep(t,0.3,0.5)*0.55);
  const da=ep(t,0.2,0.5)*0.28;
  const rgb=hexRgb(AC);
  cx.strokeStyle=`rgba(${rgb},${da})`; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(80,162); cx.lineTo(W-80,162); cx.stroke();
  cx.beginPath(); cx.moveTo(W/2+40,176); cx.lineTo(W/2+40,H-40); cx.stroke();
}

function hexRgb(h){
  return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
}

function accentToBurgundy(AC,t,freq,phase){
  // от акцентного цвета к тёмно-бордовому (#6B0010)
  const p=(Math.sin(t*freq+phase)+1)/2;
  const r0=parseInt(AC.slice(1,3),16),g0=parseInt(AC.slice(3,5),16),b0=parseInt(AC.slice(5,7),16);
  const r1=107, g1=0, b1=16; // #6B0010
  return `rgb(${Math.round(r0+(r1-r0)*p)},${Math.round(g0+(g1-g0)*p)},${Math.round(b0+(b1-b0)*p)})`;
}

// ─── КОД ─────────────────────────────────────────────────────────────────────

const PRIME_LINES=[
  'int m=2013265921,N=1,t[1<<27],a,*p,i,e=139390849,s,c,U=1;',
  'g(d,h){for(i=s;i<1<<26;i*=2)d=d*1LL*d%m;',
  'for(p=t;p<t+N;p+=s)for(i=s,c=1;i;i--)',
  'a=p[s]*(h?c:1LL)%m,p[s]=(m*1U+*p-a)*',
  '(h?1LL:c)%m,*p=(a*1U+*p)%m,p++,c=c*1LL*d%m;}',
  'main(){for(*t=2;e/=2;){N*=2;',
  'U=U*1LL*(m+1)/2%m;for(s=N;s/=2;)g(137,0);',
  'for(p=t;p<t+N;p++)*p=*p*1LL**p%m*U%m;',
  'for(s=1;s<N;s*=2)g(749463956,1);',
  'for(a=0,p=t;p<t+N;)a+=*p<<(e&1),',
  '*p++=a%10,a/=10;}while(!*--p);',
  'for(--*t;p>=t;)putchar(48+*p--);}',
];

// реальный OTCC — оригинальный исходник Беллара (публичное достояние)
const OTCC_LINES=[
  '#define TP(x) *(int *)(e+x)',
  '#define G ({int _t=*(char*)n++;\\',
  '  if(_t==92)_t=*(char*)n++*35;_t;})',
  'e,t,n,g,i,b,c,l,s,u,o;',
  'p(x){o=o*16+x-(x<58?48:55);}',
  'q(x,y){TP(x)=TP(x)+y-e;}',
  'main(a,v)char**v;{',
  '  b=open(v[1],0);e=sbrk(0);',
  '  n=malloc(1<<20);read(b,n,1<<20);',
  '  t=e=sbrk((int)sbrk(0)+80000);',
  '  for(;;){i=G;',
  '    if(i==32|i==10|i==9)continue;',
  '    if(i>=65){s=n-1;',
  '      while((u=*n)>=48&&(u<=57||u>=65))n++;',
  '    }',
  '  }',
  '  ((int(*)())e)();',
  '}',
];

function drawCode(lines,x,y,lh,fs,reveal,alpha){
  cx.font=`${fs}px 'Share Tech Mono'`;
  const total=lines.join('').length;
  const show=reveal<0?Infinity:Math.floor(ease(clamp(reveal,0,1))*total);
  cx.globalAlpha=clamp(alpha,0,1); let cc=0;
  for(let li=0;li<lines.length;li++){
    const line=lines[li]; let lx=x; const ly=y+li*lh;
    for(let ci=0;ci<line.length;ci++){
      if(cc>=show) break;
      cx.fillStyle=WH; cx.fillText(line[ci],lx,ly);
      lx+=cx.measureText(line[ci]).width; cc++;
    }
    if(cc>=show) break;
  }
  cx.globalAlpha=1; return cc;
}

function cursorPos(lines,x,y,lh,fs,n){
  cx.font=`${fs}px 'Share Tech Mono'`;
  let cc=0;
  for(let li=0;li<lines.length;li++){
    const line=lines[li]; let lx=x;
    for(let ci=0;ci<line.length;ci++){
      if(cc>=n) return {x:lx,y:y+li*lh};
      lx+=cx.measureText(line[ci]).width; cc++;
    }
  }
  return null;
}

// ─── ТАЙМИНГИ ────────────────────────────────────────────────────────────────
const TD=0.5;
const S1_END=13,  T12_END=13.5;
const S2_START=13.5, S2_END=36.5, T23_END=37;
const S3_START=37, S3_END=48, T34_END=48.5;
const S4_START=48.5, S4_END=63.5;

// ─── СЦЕНА 1 ─────────────────────────────────────────────────────────────────
function drawScene1(t){
  const AC=C1, RX=W/2+60, M=80;
  cx.fillStyle=BK; cx.fillRect(0,0,W,H);
  cx.font=`700 760px 'Oswald'`; cx.fillStyle=`rgba(0,238,255,${0.10*ep(t,0,0.8)})`;
  cx.textAlign='left'; cx.fillText('2000',10,780);
  sceneHeader('IOCCC 2000','«Самый специфичный вывод» · Фабрис Беллар',t,AC);

  const rev=clamp((t-0.5)/4,0,1);
  const drawn=drawCode(PRIME_LINES,M,220,66,40,rev,ep(t,0.5,0.3));
  if(rev>0&&rev<1&&Math.floor(t*5)%2===0){
    const pos=cursorPos(PRIME_LINES,M,220,66,40,drawn);
    if(pos){ cx.fillStyle=AC; cx.globalAlpha=0.8; cx.fillRect(pos.x,pos.y-36,3,40); cx.globalAlpha=1; }
  }

  if(t>5) notes([
    'алгоритм: модульное быстрое преобразование Фурье',
    'вычисляет простое число напрямую в десятичной системе',
  ],M,1000,ep(t,5,1),28,AC);

  infoBlock('IOCCC',[
    'International Obfuscated C Code Contest',
    'конкурс: написать самый запутанный код на C,',
    'который при этом работает и делает что-то осмысленное.',
    'Лимит — не более 4 096 байт исходника.',
    'Проводится ежегодно с 1984 года.',
  ],RX,220,ep(t,0.5,1),AC);

  if(t>5.5) txt(Math.floor(ep(t,5.5,0.7)*447)+' байт',W-M,820,`700 190px 'Oswald'`,WH,ep(t,5.5,0.8),'right');
  if(t>8)   txt(Math.floor(ep(t,8,0.9)*2098960).toLocaleString('ru-RU')+' цифр',W-M,1010,`700 100px 'Oswald'`,AC,ep(t,8,1),'right');
  if(t>11)  notes(['вычисление занимает несколько месяцев'],RX,1080,ep(t,11,1),28,AC);
}

// ─── СЦЕНА 2 ─────────────────────────────────────────────────────────────────
function drawScene2(t){
  const AC=C2, RX=W/2+60, M=80;
  const sceneDur=S2_END-S2_START; // ~23s
  cx.fillStyle=BK; cx.fillRect(0,0,W,H);
  cx.font=`700 760px 'Oswald'`; cx.fillStyle=`rgba(255,179,0,${0.10*ep(t,0,0.8)})`;
  cx.textAlign='left'; cx.fillText('2001',10,780);
  sceneHeader('IOCCC 2001','«Лучшее нарушение правил» · Фабрис Беллар',t,AC);

  // код печатается за всё время сцены
  const rev=clamp((t-0.5)/(sceneDur-2),0,1);
  const drawn=drawCode(OTCC_LINES,M,220,56,34,rev,ep(t,0.5,0.3));
  if(rev>0&&rev<1&&Math.floor(t*5)%2===0){
    const pos=cursorPos(OTCC_LINES,M,220,56,34,drawn);
    if(pos){ cx.fillStyle=AC; cx.globalAlpha=0.8; cx.fillRect(pos.x,pos.y-30,3,34); cx.globalAlpha=1; }
  }

  if(t>14){
    const a=ep(t,14,1.2);
    cx.strokeStyle=`rgba(255,179,0,${a*0.28})`; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(M,H-148); cx.lineTo(W/2,H-148); cx.stroke();
    txt('./otcc  otcc.c',M,H-78,`700 52px 'Share Tech Mono'`,WH,a);
    notes(['компилирует сам себя — самохостинг'],M,H-28,a,28,AC);
  }

  if(t>6) infoBlock('OTCC — Obfuscated Tiny C Compiler',[
    'компилятор подмножества языка C,',
    'написанный Беллером специально для IOCCC.',
    'Токенизация, парсинг, генерация i386-кода,',
    'компоновка — всё в одном файле.',
    'Исходник — публичное достояние.',
  ],RX,220,ep(t,6,1.2),AC);

  if(t>6) txt(Math.floor(ep(t,6,0.7)*3072)+' байт',W-M,810,`700 190px 'Oswald'`,WH,ep(t,6,0.8),'right');

  if(t>10) infoBlock('GCC — GNU Compiler Collection',[
    'стандартный компилятор C в Linux.',
    'Разрабатывается с 1987 года.',
    'Более 15 000 000 строк исходного кода.',
    'Сотни инженеров, десятки архитектур.',
  ],RX,860,ep(t,10,1.2),AC);

  if(t>10){
    const a=ep(t,10,1.5), bx=RX, maxBW=W-RX-M, bh=46;
    cx.globalAlpha=clamp(a,0,1);
    cx.font=`700 28px 'IBM Plex Mono'`; cx.fillStyle=`rgba(255,255,255,0.4)`;
    cx.fillText('GCC',bx,1176);
    cx.fillStyle=`rgba(255,255,255,0.14)`; cx.fillRect(bx+110,1140,maxBW,bh);
    cx.font=`22px 'IBM Plex Mono'`; cx.fillStyle=`rgba(255,255,255,0.38)`;
    cx.fillText('> 10 000 000 байт',bx+120,1168);
    if(t>11.5){
      const a2=ep(t,11.5,1.2);
      cx.globalAlpha=clamp(a*a2,0,1);
      cx.font=`700 28px 'IBM Plex Mono'`; cx.fillStyle=AC;
      cx.fillText('OTCC',bx,1268);
      const bw=Math.max(4,Math.floor(maxBW*0.00031));
      cx.fillStyle=AC; cx.fillRect(bx+110,1232,bw,bh);
      cx.font=`700 52px 'Oswald'`; cx.fillStyle=WH;
      cx.fillText('3 072 байта',bx+110+bw+16,1268);
    }
    cx.globalAlpha=1;
    if(t>14) txt('в 3000 раз меньше',W-M,1380,`700 100px 'Oswald'`,AC,ep(t,14,1.5),'right');
  }

  if(t>19) notes(['вырос в TinyCC — используется по сей день'],RX,1410,ep(t,19,1.5),28,AC);
}

// ─── СЦЕНА 3 ─────────────────────────────────────────────────────────────────
function drawScene3(t){
  const AC=C3, RX=W/2+60, M=80;
  cx.fillStyle=BK; cx.fillRect(0,0,W,H);
  cx.font=`700 760px 'Oswald'`; cx.fillStyle=`rgba(255,107,53,${0.10*ep(t,0,0.8)})`;
  cx.textAlign='left'; cx.fillText('2003',10,780);
  sceneHeader('2003','QEMU · Фабрис Беллар',t,AC);

  if(t>0.5){
    const a=ep(t,0.5,1.2);
    txt('QEMU',M,460,`700 280px 'Oswald'`,AC,a*0.9);
    txt('Quick EMUlator',M,522,`32px 'IBM Plex Mono'`,WH,a*0.5);
  }

  const mechLines=[
    'запускает одну ОС внутри другой',
    'перехватывает каждую инструкцию виртуального CPU',
    'транслирует её в инструкции реального CPU',
    'в реальном времени, без значимых задержек',
    'поддерживает x86, ARM, MIPS, RISC-V и ещё 20+ архитектур',
  ];
  if(t>2) for(let i=0;i<mechLines.length;i++)
    note(mechLines[i],M,636+i*52,ep(t,2+i*0.6,0.8),30,AC);

  infoBlock('QEMU',[
    'Quick EMUlator — эмулятор процессора.',
    'Написан Беллером в 2003 году, один.',
    'Открытый исходный код — лицензия GPL.',
    'Первая версия — менее 50 000 строк кода.',
    'Сегодня в проекте >3 000 контрибьюторов.',
  ],RX,220,ep(t,0.5,1),AC);

  if(t>4) infoBlock('динамическая трансляция (DBT)',[
    'вместо интерпретации каждой инструкции',
    'QEMU компилирует блоки гостевого кода',
    'в нативный код хоста на лету.',
    'результат кэшируется — повторный вызов',
    'того же блока не требует перевода заново.',
  ],RX,680,ep(t,4,1.2),AC);

  if(t>8){
    const a=ep(t,8,1.5);
    txt('~50 000',W-M,1160,`700 160px 'Oswald'`,WH,a,'right');
    notes(['строк кода в первой версии'],RX,1180,a,28,AC);
  }
}

// ─── СЦЕНА 4 ─────────────────────────────────────────────────────────────────
function drawScene4(t){
  const AC=C4, RX=W/2+60, M=80;
  cx.fillStyle=BK; cx.fillRect(0,0,W,H);
  cx.font=`700 500px 'Oswald'`; cx.fillStyle=`rgba(255,34,68,${0.08*ep(t,0,0.8)})`;
  cx.textAlign='left'; cx.fillText('KVM',10,580);
  sceneHeader('KVM','следствие QEMU · с 2007 года',t,AC);

  if(t>0.5){
    const a=ep(t,0.5,1);
    txt('KVM',M,380,`700 220px 'Oswald'`,AC,a*0.9);
    txt('Kernel-based Virtual Machine',M,432,`28px 'IBM Plex Mono'`,WH,a*0.5);
  }

  // платформы с клиентами
  const platforms=[
    { name:'Amazon Web Services',    clients:'Netflix, Airbnb, NASA, Disney+' },
    { name:'Google Cloud',           clients:'Spotify, Twitter/X, Snapchat' },
    { name:'Yandex Cloud',           clients:'Яндекс, Тинькофф, X5 Retail Group' },
    { name:'Alibaba Cloud',          clients:'AliExpress, Taobao, Lazada' },
    { name:'IBM / Oracle Cloud',     clients:'Deutsche Bank, FedEx, Marriott' },
    { name:'Hetzner / DigitalOcean', clients:'сотни тысяч стартапов по всему миру' },
    { name:'Android Studio',         clients:'каждый Android-разработчик на планете' },
  ];
  const PFS=46, PSUB=28, PLH=PFS+PSUB+22;
  if(t>1.5){
    for(let i=0;i<platforms.length;i++){
      const a=ep(t,1.5+i*0.35,0.6);
      if(a<=0) continue;
      const py=500+i*PLH;
      cx.globalAlpha=clamp(a,0,1);
      cx.font=`700 ${PFS}px 'IBM Plex Mono'`;
      cx.fillStyle=AC;
      const arrow='→  ';
      const aw=cx.measureText(arrow).width;
      cx.fillText(arrow,M,py);
      cx.fillStyle=WH;
      cx.fillText(platforms[i].name,M+aw,py);
      cx.font=`700 ${PSUB}px 'IBM Plex Mono'`;
      cx.fillStyle=accentToBurgundy(AC,t,1.8,i*1.3);
      cx.globalAlpha=clamp(a,0,1);
      cx.fillText(platforms[i].clients,M+aw,py+PSUB+6);
      cx.globalAlpha=1;
    }
  }

  // правая колонка
  infoBlock('KVM',[
    'Kernel-based Virtual Machine.',
    'Вошёл в ядро Linux 2.6.20 в 2007 году.',
    'Использует Intel VT-x / AMD-V.',
    'Работает поверх QEMU как гипервизор.',
    'Открытый исходный код — лицензия GPL.',
  ],RX,220,ep(t,0.5,1),AC);

  if(t>6) infoBlock('рынок облачных вычислений в 2024',[
    '$270 млрд в год (Gartner)',
    'AWS — ~33% рынка',
    'Google Cloud — ~11% рынка',
    'на каждый запуск ВМ в большинстве облаков',
    'в той или иной форме — код Беллара',
  ],RX,730,ep(t,6,1.2),AC);

  // ── ситуации обычного пользователя (t=7..конец) ──
  if(t>7){
    const situations=[
      { action:'Ты открываешь Netflix',        sub:'AWS · KVM · код Беллара' },
      { action:'Ты слушаешь Spotify',          sub:'Google Cloud · KVM · код Беллара' },
      { action:'Ты покупаешь на AliExpress',   sub:'Alibaba Cloud · KVM · код Беллара' },
      { action:'Ты пишешь в Telegram',         sub:'AWS · KVM · код Беллара' },
      { action:'Ты гуглишь что-то',            sub:'Google Cloud · KVM · код Беллара' },
      { action:'Ты платишь картой онлайн',     sub:'Oracle Cloud · KVM · код Беллара' },
      { action:'Ты смотришь YouTube',          sub:'Google Cloud · KVM · код Беллара' },
      { action:'Ты вызываешь такси',           sub:'Yandex Cloud / AWS · KVM · код Беллара' },
    ];

    const perItem=1.0;
    const ACTION_FS=100, SUB_FS=40, ITEM_H=ACTION_FS+SUB_FS+16;
    const totalH=situations.length*ITEM_H;
    const startY=H/2-totalH/2+ACTION_FS;
    const tLocal=t-7;

    // затемняем фон
    cx.fillStyle=`rgba(0,0,0,${ep(t,7,0.4)*0.92})`;
    cx.fillRect(0,0,W,H);

    for(let i=0;i<situations.length;i++){
      const a=ep(tLocal,i*perItem,0.35);
      if(a<=0) continue;
      const s=situations[i];
      const py=startY+i*ITEM_H;

      cx.globalAlpha=clamp(a,0,1);
      cx.font=`700 ${ACTION_FS}px 'Oswald'`;
      cx.fillStyle=AC;
      const arrow='→  ';
      const aw=cx.measureText(arrow).width;
      cx.fillText(arrow,M,py);
      cx.fillStyle=WH;
      cx.fillText(s.action,M+aw,py);
      cx.font=`700 ${SUB_FS}px 'IBM Plex Mono'`;
      cx.fillStyle=accentToBurgundy(AC,t,2.5,i*0.9);
      cx.fillText(s.sub,M+aw,py+SUB_FS+10);
      cx.globalAlpha=1;
    }
  }
}

// ─── ПЕРЕХОД ─────────────────────────────────────────────────────────────────
// новая сцена въезжает сверху, старая стоит неподвижно
function slideIn(drawStatic, drawIncoming, progress){
  const p=easeOut(clamp(progress,0,1));
  cx.save(); cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
  drawStatic();
  cx.restore();
  const oy=-H+p*H;
  cx.save(); cx.translate(0,oy);
  cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
  drawIncoming();
  cx.restore();
}

// ─── ГЛАВНЫЙ ЦИКЛ ────────────────────────────────────────────────────────────
let t0=null, running=false, raf=null;

function frame(ts){
  if(!running) return;
  if(t0===null) t0=ts;
  const e=(ts-t0)/1000;

  cx.fillStyle=BK; cx.fillRect(0,0,W,H);

  if(e < S1_END){
    cx.save(); cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
    drawScene1(e); cx.restore();

  } else if(e < T12_END){
    slideIn(
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene1(S1_END); },
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene2(0); },
      (e-S1_END)/TD
    );

  } else if(e < S2_END){
    cx.save(); cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
    drawScene2(e-S2_START); cx.restore();

  } else if(e < T23_END){
    slideIn(
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene2(S2_END-S2_START); },
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene3(0); },
      (e-S2_END)/TD
    );

  } else if(e < S3_END){
    cx.save(); cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
    drawScene3(e-S3_START); cx.restore();

  } else if(e < T34_END){
    slideIn(
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene3(S3_END-S3_START); },
      ()=>{ cx.fillStyle=BK; cx.fillRect(0,0,W,H); drawScene4(0); },
      (e-S3_END)/TD
    );

  } else if(e < S4_END){
    cx.save(); cx.beginPath(); cx.rect(0,0,W,H); cx.clip();
    drawScene4(e-S4_START); cx.restore();

  } else {
    cx.fillStyle=BK; cx.fillRect(0,0,W,H);
    cx.font=`700 40px 'IBM Plex Mono'`; cx.fillStyle=`rgba(0,238,255,0.45)`;
    cx.textAlign='center'; cx.fillText('R / К — заново',W/2,H/2);
    cx.textAlign='left'; scanlines(); running=false; return;
  }

  scanlines();
  raf=requestAnimationFrame(frame);
}

function start(){
  if(raf) cancelAnimationFrame(raf);
  t0=null; running=true;
  raf=requestAnimationFrame(frame);
}

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='r'||k==='R'||k==='к'||k==='К') start();
});

cx.fillStyle=BK; cx.fillRect(0,0,W,H);
cx.font=`700 40px 'IBM Plex Mono'`; cx.fillStyle=`rgba(0,238,255,0.45)`;
cx.textAlign='center'; cx.fillText('R / К — старт',W/2,H/2);
cx.textAlign='left'; scanlines();
</script>
