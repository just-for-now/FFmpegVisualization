// Grid: 720x360, each cell = 0.5° x 0.5°
var GW=720, GH=360;
var hmapData=null;
var SEA=0.15, HMAX=40.0;

function getH(gx,gy){
  var x=Math.max(0,Math.min(GW-1,gx|0));
  var y=Math.max(0,Math.min(GH-1,gy|0));
  return hmapData[(y*GW+x)*4]/255;
}

// lon,lat → world x,z (y=up)
// FIX: lat increases upward → z decreases as lat increases
// lon: -180..180 → x: -180..180
// lat: -90..90   → z: 90..-90  (north = negative z, south = positive z)
// This matches standard right-hand coords where camera looks toward -z
function lonlatToXZ(lon, lat) {
  return [lon, -lat]; // x=lon, z=-lat (north is -z)
}

function elevColor(h, face, isAmer){
  var t = h<SEA ? 0 : (h-SEA)/(1-SEA);
  var dim = face===0 ? 1.0 : face===1 ? 0.40 : 0.22;
  var r,g,b;
  if(h<SEA){ return [0.0, 0.0, 0.0]; }
  if(isAmer){
    // Red/orange palette for Americas
    if(t<0.18){var f=t/0.18; r=(0.25+f*0.35)*dim; g=0; b=0;}
    else if(t<0.45){var f=(t-0.18)/0.27; r=(0.60+f*0.30)*dim; g=f*0.04*dim; b=0;}
    else if(t<0.75){var f=(t-0.45)/0.30; r=(0.90+f*0.09)*dim; g=(0.04+f*0.08)*dim; b=0;}
    else{var f=(t-0.75)/0.25; r=dim; g=Math.min(1,(0.12+f*0.85)*dim); b=Math.min(1,f*0.7*dim);}
  } else {
    // Blue palette for rest of world
    if(t<0.15){var f=t/0.15; r=0; g=(0.03+f*0.06)*dim; b=(0.18+f*0.28)*dim;}
    else if(t<0.45){var f=(t-0.15)/0.30; r=0; g=(0.09+f*0.14)*dim; b=(0.46+f*0.28)*dim;}
    else if(t<0.75){var f=(t-0.45)/0.30; r=(0.02+f*0.18)*dim; g=(0.23+f*0.38)*dim; b=(0.74+f*0.18)*dim;}
    else{var f=(t-0.75)/0.25; r=(0.20+f*0.60)*dim; g=Math.min(1,(0.61+f*0.35)*dim); b=Math.min(1,(0.92+f*0.08)*dim);}
  }
  return [Math.min(1,r), Math.min(1,g), Math.min(1,b)];
}

function buildOceanGeometry(){
  var verts=[];
  var dLon=360/GW, dLat=180/GH;
  for(var gy=0;gy<GH;gy++){
    for(var gx=0;gx<GW;gx++){
      if(getH(gx,gy)>=SEA) continue;
      var x0=gx*dLon-180, x1=x0+dLon;
      var z0=-(90-gy*dLat), z1=-(90-(gy+1)*dLat);
      verts.push(x0,0.0,z0, x1,0.0,z0, x1,0.0,z1);
      verts.push(x0,0.0,z0, x1,0.0,z1, x0,0.0,z1);
    }
  }
  return new Float32Array(verts);
}
function buildGeometry(){
  var verts=[];
  function pQ(ax,ay,az, bx,by,bz, cx,cy,cz, dx,dy,dz, c){
    verts.push(ax,ay,az,c[0],c[1],c[2], bx,by,bz,c[0],c[1],c[2], cx,cy,cz,c[0],c[1],c[2]);
    verts.push(ax,ay,az,c[0],c[1],c[2], cx,cy,cz,c[0],c[1],c[2], dx,dy,dz,c[0],c[1],c[2]);
  }

  var dLon = 360/GW;  // 0.5°
  var dLat = 180/GH;  // 0.5°

  for(var gy=0; gy<GH; gy++){
    for(var gx=0; gx<GW; gx++){
      var h = getH(gx,gy);
      var ocean = h < SEA;

      // Cell lon/lat corners
      var lon0 = gx*dLon - 180;      // west edge
      var lon1 = lon0 + dLon;        // east edge
      var lat0 = 90 - gy*dLat;       // north edge  (larger lat)
      var lat1 = lat0 - dLat;        // south edge  (smaller lat)

      // World coords: x=lon, z=-lat (north=-z), y=elevation (up)
      var x0=lon0, x1=lon1;
      var z0=-lat0, z1=-lat1;        // z0 < z1 (north < south in z)

      var yT = ocean ? 0 : (h-SEA)/(1-SEA)*HMAX*0.5;

      var lonMid=(lon0+lon1)/2, latMid=(lat0+lat1)/2;
      // USA only: contiguous + Alaska
      var isAmer=((lonMid>=-125&&lonMid<=-66&&latMid>=24&&latMid<=50)||
                  (lonMid>=-170&&lonMid<=-130&&latMid>=54&&latMid<=72));
      var tc = elevColor(h,0,isAmer);
      if(ocean) continue;
      pQ(x0,yT,z0, x1,yT,z0, x1,yT,z1, x0,yT,z1, tc);

      if(yT>0.02){
        var sc=elevColor(h,1,isAmer), dc=elevColor(h,2,isAmer);
        // South wall (z1 = south face, facing +z)
        pQ(x1,yT,z1, x0,yT,z1, x0,0,z1, x1,0,z1, sc);
        // North wall (z0 = north face, facing -z)
        pQ(x0,yT,z0, x1,yT,z0, x1,0,z0, x0,0,z0, sc);
        // East wall (x1, facing +x)
        pQ(x1,yT,z0, x1,yT,z1, x1,0,z1, x1,0,z0, dc);
        // West wall (x0, facing -x)
        pQ(x0,yT,z1, x0,yT,z0, x0,0,z0, x0,0,z1, dc);
      }
    }
  }
  return new Float32Array(verts);
}

// ── TopoJSON borders ──────────────────────────────────────────────────────
var polys=[];
function decodeTopo(topo){
  var sc=topo.transform.scale, tr=topo.transform.translate, arcs=topo.arcs;
  function da(arc){
    var x=0,y=0;
    return arc.map(function(d){x+=d[0];y+=d[1];return[x*sc[0]+tr[0], y*sc[1]+tr[1]];});
  }
  function ga(i){return i>=0?da(arcs[i]):da(arcs[~i].slice().reverse());}
  function rng(ids){
    var pts=[];
    for(var k=0;k<ids.length;k++){var d=ga(ids[k]);pts=pts.length?pts.concat(d.slice(1)):d.slice();}
    return pts;
  }
  var res=[];
  var obj=topo.objects.countries;
  for(var gi=0;gi<obj.geometries.length;gi++){
    var g=obj.geometries[gi];
    if(g.type==='Polygon'){
      var p=[];for(var ri=0;ri<g.arcs.length;ri++)p.push(rng(g.arcs[ri]));res.push(p);
    } else if(g.type==='MultiPolygon'){
      for(var pi=0;pi<g.arcs.length;pi++){
        var p2=[];for(var ri2=0;ri2<g.arcs[pi].length;ri2++)p2.push(rng(g.arcs[pi][ri2]));res.push(p2);
      }
    }
  }
  return res;
}

function hAtLonLat(lon,lat){
    var gx=Math.max(0,Math.min(GW-1, (lon+180)/360*GW |0));
    var gy=Math.max(0,Math.min(GH-1, (90-lat)/180*GH  |0));
    var h=getH(gx,gy);
    return h<SEA ? 0.3 : (h-SEA)/(1-SEA)*HMAX*0.5 + 0.5;
}
function buildBorderLines(){
  var segs=[];

  function hAtLonLat(lon,lat){
    var gx=Math.max(0,Math.min(GW-1, (lon+180)/360*GW |0));
    var gy=Math.max(0,Math.min(GH-1, (90-lat)/180*GH  |0));
    var h=getH(gx,gy);
    return h<SEA ? 0.3 : (h-SEA)/(1-SEA)*HMAX*0.5 + 0.5;
  }

  for(var pi=0;pi<polys.length;pi++){
    var ring=polys[pi][0];
    if(!ring||ring.length<2) continue;

    for(var i=0;i<ring.length;i++){
      var a=ring[i];
      var b=ring[(i+1)%ring.length];
      var lonA=a[0], latA=a[1];
      var lonB=b[0], latB=b[1];

      // Skip antimeridian-crossing segments (lon jump > 180°)
      var dlon = Math.abs(lonA-lonB);
      if(dlon > 180) continue;
      // Also skip suspiciously long segments (> 30°)
      var dlat = Math.abs(latA-latB);
      if(dlon > 30 && dlat > 30) continue;

      var yA=hAtLonLat(lonA,latA);
      var yB=hAtLonLat(lonB,latB);

      // World: x=lon, z=-lat
      segs.push(lonA, yA, -latA,  lonB, yB, -latB);
    }
  }
  return new Float32Array(segs);
}

void main(){gl_Position=uMVP*vec4(aPos,1.0);vUV=aPos.xz;}`;
var FS_W=`precision mediump float;varying vec2 vUV;uniform float uTime;
void main(){
  vec2 uv=vUV*0.04;
  float w1=sin(uv.x*6.0+uTime*1.2)*cos(uv.y*4.0+uTime*0.9);
  float w2=sin(uv.x*3.5-uTime*0.7+uv.y*5.0)*0.5;
  float w3=cos(uv.x*8.0+uv.y*6.0-uTime*1.5)*0.3;
  float wave=(w1+w2+w3)*0.12+0.5;
  float r=0.02+wave*0.02;
  float g=0.06+wave*0.07;
  float b=0.14+wave*0.13;
  gl_FragColor=vec4(r,g,b,1.0);
}`;

function mkProg(vs,fs){

  var p=gl.createProgram();
  gl.attachShader(p,mkS(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,mkS(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);return p;
}

// out = a*b
function mMul(out,a,b){
  for(var col=0;col<4;col++){
    for(var row=0;row<4;row++){
      var s=0;
      for(var k=0;k<4;k++) s+=a[k*4+row]*b[col*4+k];
      out[col*4+row]=s;
    }
  }
  return out;
}
function mPersp(m,fov,asp,n,f){
  var t=1/Math.tan(fov/2), nf=1/(n-f);
  mId(m);
  m[0]=t/asp; m[5]=t;
  m[10]=(f+n)*nf; m[11]=-1;
  m[14]=2*f*n*nf; m[15]=0;
  return m;
}
function mRotY(m,a){
  mId(m);
  var c=Math.cos(a),s=Math.sin(a);
  m[0]=c;  m[8]=s;   // col0row0, col2row0
  m[2]=-s; m[10]=c;  // col0row2, col2row2
  return m;
}
function mRotX(m,a){
  mId(m);
  var c=Math.cos(a),s=Math.sin(a);
  m[5]=c;  m[9]=-s;  // col1row1, col2row1
  m[6]=s;  m[10]=c;  // col1row2, col2row2
  return m;
}
function mTrans(m,x,y,z){
  mId(m);
  m[12]=x; m[13]=y; m[14]=z;
  return m;
}

var tProg=null,lProg=null,tBuf=null,lBuf=null,tCount=0,lCount=0;
var Mp=m4(),My=m4(),Mx=m4(),Mt=m4(),Mtmp=m4(),Mmvp=m4();

function buildMVP(){
  mPersp(Mp, 0.65, canvas.width/canvas.height, 1, 2000);
  mRotY(My, camAz);
  mRotX(Mx, camEl);
  mTrans(Mt, 0, -10, -camDist);
  // MVP = Proj * Trans * RotX * RotY
  mMul(Mtmp, Mx, My);       // RotX * RotY
  mMul(Mmvp, Mt, Mtmp);     // Trans * (RotX*RotY)
  mMul(Mtmp, Mp, Mmvp);     // Proj * (Trans*RotX*RotY)
  return Mtmp;
}


function drawLabels(){
  var oc=document.getElementById('lc');
  if(!oc){oc=document.createElement('canvas');oc.id='lc';
    oc.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:5';
    document.body.appendChild(oc);}
  oc.width=canvas.width;oc.height=canvas.height;
  var lctx=oc.getContext('2d');
  lctx.clearRect(0,0,oc.width,oc.height);
  lctx.textAlign='center';lctx.textBaseline='middle';
  var M=buildMVP();
  for(var i=0;i<CLABELS.length;i++){
    var lb=CLABELS[i];
    var gx2=Math.max(0,Math.min(GW-1,(lb.lon+180)/360*GW|0));
    var gy2=Math.max(0,Math.min(GH-1,(90-lb.lat)/180*GH|0));
    var h2=getH(gx2,gy2);
    var wz2=h2<SEA?0.3:(h2-SEA)/(1-SEA)*HMAX*0.5+0.5;
    var v0=lb.lon,v1=wz2,v2=-lb.lat;
    var rx=M[0]*v0+M[4]*v1+M[8]*v2+M[12];
    var ry=M[1]*v0+M[5]*v1+M[9]*v2+M[13];
    var rw=M[3]*v0+M[7]*v1+M[11]*v2+M[15];
    if(rw<=0.01) continue;
    var sx=(rx/rw*0.5+0.5)*canvas.width;
    var sy=(-ry/rw*0.5+0.5)*canvas.height;
    if(sx<5||sx>canvas.width-5||sy<5||sy>canvas.height-5) continue;
    var fs=Math.max(9,Math.min(13,lb.a>800?13:lb.a>200?11:9));

    lctx.fillText(lb.n,sx+1,sy+1);
    lctx.fillStyle='rgba(140,230,240,0.88)';
    lctx.fillText(lb.n,sx,sy);
  }
}

function render(){
  if(!tProg) return;
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  var M=buildMVP();

  // Terrain
  gl.useProgram(tProg);
  gl.bindBuffer(gl.ARRAY_BUFFER,tBuf);
  var ap=gl.getAttribLocation(tProg,'aPos'), ac=gl.getAttribLocation(tProg,'aCol');
  gl.enableVertexAttribArray(ap); gl.vertexAttribPointer(ap,3,gl.FLOAT,false,24,0);
  gl.enableVertexAttribArray(ac); gl.vertexAttribPointer(ac,3,gl.FLOAT,false,24,12);
  gl.uniformMatrix4fv(gl.getUniformLocation(tProg,'uMVP'),false,M);
  gl.drawArrays(gl.TRIANGLES,0,tCount);

  // Borders
  // Water
  if(wProg && wCount>0){
    gl.useProgram(wProg);
    gl.bindBuffer(gl.ARRAY_BUFFER,wBuf);
    var aw=gl.getAttribLocation(wProg,'aPos');
    gl.enableVertexAttribArray(aw); gl.vertexAttribPointer(aw,3,gl.FLOAT,false,12,0);
    gl.uniformMatrix4fv(gl.getUniformLocation(wProg,'uMVP'),false,M);
    gl.uniform1f(gl.getUniformLocation(wProg,'uTime'),simTime);
    gl.drawArrays(gl.TRIANGLES,0,wCount);
  }

  if(lCount>0){
    gl.useProgram(lProg);
    gl.bindBuffer(gl.ARRAY_BUFFER,lBuf);
    var ap2=gl.getAttribLocation(lProg,'aPos');
    gl.enableVertexAttribArray(ap2); gl.vertexAttribPointer(ap2,3,gl.FLOAT,false,12,0);
    gl.uniformMatrix4fv(gl.getUniformLocation(lProg,'uMVP'),false,M);
    gl.uniform4f(gl.getUniformLocation(lProg,'uColor'),0.0,0.55,0.65,0.55);
    gl.drawArrays(gl.LINES,0,lCount);
  }
}

var running=false;
function frame(){
  if(!running)return;
  requestAnimationFrame(frame);
  simTime+=0.016;
  if(autoRot){camAz+=0.0012;render();}
  else{render();}
  var az=(((camAz*180/Math.PI)%360)+360)%360|0;
  drawLabels();
  drawAnim();

    'AZ:'+az+'°  EL:'+(camEl*180/Math.PI|0)+'°  DIST:'+(camDist|0);

        setTimeout(function(){h.style.opacity='0';},3000);

function projectPt(lon, lat, elev) {
  var y;
  if(elev === undefined || elev === null) {
    y = hmapData ? hAtLonLat(lon, lat) + 0.5 : 0.5;
  } else {
    y = elev;
  }
  var M = buildMVP();
  var v0=lon, v1=y, v2=-lat;
  var rx=M[0]*v0+M[4]*v1+M[8]*v2+M[12];
  var ry=M[1]*v0+M[5]*v1+M[9]*v2+M[13];
  var rw=M[3]*v0+M[7]*v1+M[11]*v2+M[15];
  if(rw<=0.01) return null;
  return {x:(rx/rw*0.5+0.5)*canvas.width, y:(-ry/rw*0.5+0.5)*canvas.height};
}

function clamp01(v){return Math.max(0,Math.min(1,v));}
function aramp(s,e){return clamp01((animT-s)/(e-s));}
function eOut(x){return 1-(1-x)*(1-x);}
function eIn(x){return x*x;}

// Glitch typewriter: returns corrupted string based on reveal progress
var GLYPHS = 'АПТЕНarcs$%#@!?0123456789XYSN';
function glitchText(str, progress) {
  var result = '';
  var n = str.length;
  var revealed = Math.min(n, Math.floor(progress * (n + 4)));
  for (var i = 0; i < n; i++) {
    if (str[i] === ' ') { result += ' '; continue; }
    if (i < revealed - 1) {
      // Stable - rare flicker
      if (Math.random() < 0.015) result += GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      else result += str[i];
    } else if (i === revealed - 1) {
      // Edge - rapid flicker
      if (Math.random() < 0.55) result += GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      else result += str[i];
    } else if (i <= revealed + 1) {
      // Upcoming noise
      result += GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
    } else {
      result += '\u00B7';  // · placeholder
    }
  }
  return result;
}

function AnimLawsuit(sx,sy,tx,ty,delay){
  this.sx=sx;this.sy=sy;this.tx=tx;this.ty=ty;
  this.delay=delay;this.prog=0;this.exploded=false;this.explodeT=0;this.alive=true;
}
AnimLawsuit.prototype.update=function(dt){
  if(this.delay>0){this.delay-=dt;return;}
  if(this.exploded){this.explodeT+=dt;if(this.explodeT>0.55)this.alive=false;return;}
  this.prog=Math.min(1,this.prog+dt*0.5);
  if(this.prog>=1)this.exploded=true;
};
AnimLawsuit.prototype.draw=function(ctx,fScale){
  if(this.delay>0||!this.alive)return;
  var p=this.prog;
  var cx=this.sx+(this.tx-this.sx)*p;
  var cy=this.sy+(this.ty-this.sy)*p-Math.sin(p*Math.PI)*60;
  if(this.exploded){
    var r=this.explodeT*48;
    var a=1-this.explodeT/0.55;
    ctx.save();ctx.globalAlpha=a;
    ctx.strokeStyle='#e50004';ctx.lineWidth=2*fScale;
    ctx.shadowColor='#e50004';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=3*fScale;
    ctx.beginPath();
    ctx.moveTo(cx-r*0.4,cy-r*0.4);ctx.lineTo(cx+r*0.4,cy+r*0.4);
    ctx.moveTo(cx+r*0.4,cy-r*0.4);ctx.lineTo(cx-r*0.4,cy+r*0.4);
    ctx.stroke();ctx.restore();return;
  }
  ctx.save();
  for(var i=0;i<10;i++){
    var tp=Math.max(0,p-i*0.028);
    var tx2=this.sx+(this.tx-this.sx)*tp;
    var ty2=this.sy+(this.ty-this.sy)*tp-Math.sin(tp*Math.PI)*60;
    ctx.globalAlpha=(1-i/10)*0.7;ctx.fillStyle='#e50004';
    ctx.shadowColor='#e50004';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(tx2,ty2,3-i*0.25,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
};

    if(!animRevealed[i])return;
    var pt=projectPt(dev.lon,dev.lat); if(!pt)return;
    var pulse=(Math.sin(animT*2.5+i*0.8)+1)/2;
    var r=(6+pulse*3)*fScale;
    var revAge=Math.min(1,(animT-animRevealTimes[i])*3);
    var alpha=revAge*s2a; if(alpha<0.01)return;

    // Ping rings on reveal
    var pingAge=animT-animRevealTimes[i];
    if(pingAge<0.8){
      var pingProgress=pingAge/0.8;
      [1,0.55].forEach(function(delay,ri){
        var pp=Math.max(0,pingProgress-delay*0.3);
        if(pp<=0||pp>=1)return;
        var pr=pp*W*0.04*(1+ri*0.4);
        var pa=(1-pp)*s2a*0.7;
        ctx.save();
        ctx.globalAlpha=pa;
        ctx.strokeStyle='#00ff88';ctx.lineWidth=2*fScale;
        ctx.shadowColor='#00ff88';ctx.shadowBlur=12;
        ctx.beginPath();ctx.arc(pt.x,pt.y,pr,0,Math.PI*2);ctx.stroke();
        ctx.restore();
      });
    }

    ctx.save(); ctx.globalAlpha=alpha;
    // Glow ring
    ctx.strokeStyle='#00ff88'; ctx.shadowColor='#00ff88';
    ctx.shadowBlur=(16+pulse*8)*fScale; ctx.lineWidth=1.5*fScale;
    ctx.beginPath();ctx.arc(pt.x,pt.y,r+4+pulse*2,0,Math.PI*2);ctx.stroke();
    // Core dot
    ctx.fillStyle='#00ff88'; ctx.shadowBlur=(14+pulse*7)*fScale;
    ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fill();
    // Label (glitch-revealed)
    if(dev.name && revAge>0.3){
      var labelProg=Math.min(1,(revAge-0.3)*3);
      var labelStr=glitchText(dev.name, labelProg);
      ctx.shadowBlur=5*fScale; ctx.globalAlpha=alpha*Math.min(1,labelProg*2);
      ctx.font=('bold '+(11*fScale))+'px IBM Plex Mono,monospace';
      ctx.fillStyle='#00ff88';
      ctx.fillText(labelStr, pt.x+r+4, pt.y-2);
    }
    ctx.restore();
  });

  // Connection lines + data pulses
  var s2l=eOut(aramp(12,16))*(1-aramp(38,40));
  if(s2l>0.01){
    var revealed=devNodes.filter(function(d,i){return animRevealed[i];});
    var phase=((animT*0.5)%1);
    ctx.save();
    for(var ii=0;ii<Math.min(revealed.length,20);ii++){
      var pa=projectPt(revealed[ii].lon,revealed[ii].lat); if(!pa)continue;
      for(var jj=ii+1;jj<Math.min(revealed.length,20);jj++){
        var pb=projectPt(revealed[jj].lon,revealed[jj].lat); if(!pb)continue;
        var dist=Math.hypot(pa.x-pb.x,pa.y-pb.y);
        if(dist>W*0.30)continue;
        ctx.globalAlpha=s2l*(1-dist/(W*0.30))*0.14;
        ctx.strokeStyle='#00ff88'; ctx.lineWidth=1*fScale;
        ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
      }
      // Data pulse
      if(ii<revealed.length-1){
        var pb2=projectPt(revealed[(ii+1)%revealed.length].lon,revealed[(ii+1)%revealed.length].lat);
        if(pb2){
          var dist2=Math.hypot(pa.x-pb2.x,pa.y-pb2.y);
          if(dist2<W*0.30){
            var ph=((phase+ii*0.07)%1);
            ctx.globalAlpha=s2l*0.5; ctx.fillStyle='#00ff88';
            ctx.shadowColor='#00ff88'; ctx.shadowBlur=8;
            ctx.beginPath();ctx.arc(pa.x+(pb2.x-pa.x)*ph,pa.y+(pb2.y-pa.y)*ph,3*fScale,0,Math.PI*2);ctx.fill();
          }
        }
      }
    }
    ctx.restore();
  }

  // Scene 2 text
  var s2txt=eOut(aramp(11,13))*(1-eIn(aramp(23,25)));
  if(s2txt>0.01){
    ctx.save(); ctx.globalAlpha=s2txt;
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=12*fScale;
    ctx.font=('400 '+(32*fScale))+'px Oswald,sans-serif';
    ['FFmpeg некоммерческий.','Добровольцы из десятков стран.','Американские патенты —','только на территории США.'].forEach(function(l,li){
      ctx.fillText(l,55*fScale,H*0.73+li*46*fScale);
    });
    var cnt=Math.min(animRevealed.filter(Boolean).length,50);
    ctx.font=('bold '+(88*fScale))+'px Oswald,sans-serif';
    ctx.fillStyle='rgba(0,80,40,0.4)'; ctx.shadowBlur=0;
    ctx.textAlign='right'; ctx.fillText(cnt+'+',W-65*fScale,H*0.18);
    ctx.font=('400 '+(20*fScale))+'px IBM Plex Mono,monospace';
    ctx.fillStyle='#00ff88';
    ctx.fillText('разработчиков по всему миру',W-65*fScale,H*0.18+33*fScale);
    ctx.textAlign='left'; ctx.restore();
  }

  // ── SCENE 3 (25–40s): Lawsuits ──────────────────────────────────────────
  if(animT>25&&!lawsuitSpawned){
    lawsuitSpawned=true;
    spawnLawsuits(devNodes.filter(function(d,i){return animRevealed[i];}),0);
  }
  if(animT>27.5&&!lawsuitSpawned2){
    lawsuitSpawned2=true;
    spawnLawsuits(devNodes.filter(function(d,i){return animRevealed[i];}).slice(10,20),0);
  }
  animLawsuits.forEach(function(l){l.update(0.016);l.draw(ctx,fScale);});
  animLawsuits=animLawsuits.filter(function(l){return l.alive;});

  var s3t=eOut(aramp(25,27))*(1-aramp(38,40));
  if(s3t>0.01){
    ctx.save(); ctx.globalAlpha=s3t; ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.shadowColor='rgba(255,255,255,0.3)'; ctx.shadowBlur=10*fScale;
    ctx.font=('bold '+(38*fScale))+'px Oswald,sans-serif';
    ctx.fillText('Судиться с сотнями людей',W/2,H*0.1);
    ctx.fillText('по всему миру...',W/2,H*0.1+52*fScale);
    var s3c=eOut(aramp(28,30))*(1-aramp(38,40));
    if(s3c>0.01){
      ctx.globalAlpha=s3t*s3c;
      ctx.font=('bold '+(65*fScale))+'px Oswald,sans-serif';
      ctx.fillStyle='#e50004'; ctx.shadowColor='#e50004'; ctx.shadowBlur=16*fScale;
      ctx.fillText('Юридически бессмысленно.',W/2,H*0.5);
      ctx.font=('400 '+(22*fScale))+'px IBM Plex Mono,monospace';
      ctx.fillStyle='rgba(229,0,4,0.7)'; ctx.shadowBlur=0;
      ctx.fillText('× разные юрисдикции  × разные языки  × годы издержек',W/2,H*0.5+40*fScale);
      ctx.fillText('Финансово разорительно.',W/2,H*0.5+75*fScale);
    }
    ctx.textAlign='left'; ctx.restore();
  }

  // ── SCENE 4 (40–50s): FFmpeg passes through ─────────────────────────────
  var s4=eOut(aramp(40,43))*(1-aramp(47,49));
  if(s4>0.01){
    var gc=projectPt(0,20,0);
    if(gc){
      var p4=(Math.sin(animT*3)+1)/2;
      [0.25,0.17,0.10].forEach(function(rf,ri){
        var rr=W*rf*(0.85+p4*0.15);
        ctx.save(); ctx.globalAlpha=s4*0.20*(1-ri*0.28);
        ctx.strokeStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=22*fScale;
        ctx.lineWidth=2.5*fScale;
        ctx.beginPath();ctx.arc(gc.x,gc.y,rr,0,Math.PI*2);ctx.stroke();
        ctx.restore();
      });
    }
    // Ghost arrow
    var gp=aramp(40,48);
    var gx2=W*0.08+W*0.84*gp, gy2=H*0.44;
    ctx.save();
    for(var ti=0;ti<22;ti++){
      var tp=Math.max(0,gp-ti*0.018);
      var tx3=W*0.08+W*0.84*tp;
      ctx.globalAlpha=(1-ti/22)*s4*0.6;
      ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(tx3,gy2,4.5-ti*0.18,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=s4;
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=36*fScale;
    ctx.beginPath();ctx.arc(gx2,gy2,14*fScale,0,Math.PI*2);ctx.fill();
    ctx.font=('bold '+(28*fScale))+'px Oswald,sans-serif';
    ctx.fillStyle='#00ff88'; ctx.fillText('FFmpeg',gx2+19*fScale,gy2+9*fScale);
    ctx.restore();

    ctx.save(); ctx.globalAlpha=s4; ctx.textAlign='center';
    ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=16*fScale;
    ctx.font=('bold '+(44*fScale))+'px Oswald,sans-serif';
    ctx.fillText('Проще сделать вид,',W/2,H*0.83);
    ctx.fillText('что проблемы не существует.',W/2,H*0.83+58*fScale);
    ctx.textAlign='left'; ctx.restore();
  }

  var s4e=eOut(aramp(44,46))*(1-aramp(48,50));
  if(s4e>0.01){
    ctx.save(); ctx.globalAlpha=s4e; ctx.textAlign='center';
    ctx.fillStyle='#00ff88'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=12*fScale;
    ctx.font=('bold '+(26*fScale))+'px Oswald,sans-serif';
    ctx.fillText('УСТРОЙСТВО FFMPEG ДЕЛАЛО АТАКУ БЕССМЫСЛЕННОЙ',W/2,H*0.95);
    ctx.textAlign='left'; ctx.restore();
  }

  // Fade to black at end
  ctx.save(); ctx.globalAlpha=aramp(49,51); ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H); ctx.restore();

  // Timecode
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#555';
  ctx.font='17px IBM Plex Mono,monospace';
  ctx.fillText(Math.floor(animT/60).toString().padStart(2,'0')+':'+((animT%60).toFixed(2).padStart(5,'0')),26,34);
  ctx.restore();
}

document.addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  if(k==='r'||k==='к'){running=false;init();}
});
init();
</script></body></html>
