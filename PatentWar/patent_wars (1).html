<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Patent Wars</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 2560px; height: 1440px; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="2560" height="1440"></canvas>
<script>
// ─── GOOGLE FONTS ───────────────────────────────────────────────────────────
(function(){
  const l=document.createElement('link');
  l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;700&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@300;600;700&display=swap';
  document.head.appendChild(l);
})();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 2560, H = 1440;

// Cyrillic-safe font: Oswald supports Russian, use instead of Bebas/Rajdhani for CYR text
// For Latin/monospace: IBM Plex Mono
// Usage: CYR(weight, size) → font string with Oswald
function CYR(weight, size) { return `${weight} ${size}px "Oswald"`; }
function MONO(weight, size) { return `${weight} ${size}px "IBM Plex Mono"`; }
function BEBA(size) { return `700 ${size}px "Bebas Neue"`; }

// ─── TIMING ─────────────────────────────────────────────────────────────────
// 90 BPM → beat = 666ms, 180 BPM → beat = 333ms
const BPM = 90;
const BEAT = 60000 / BPM;
const TOTAL = 71215;

let startTime = null;
let running = false;
let t = 0; // elapsed ms
let beat = 0; // fractional beat count

// ─── COLOR PALETTE ───────────────────────────────────────────────────────────
// Act 1: cyan/blue  Act 2: acid violet  Act 3: deep red
function getBG(t) {
  const p = t / TOTAL;
  if (p < 0.28) {
    // cyan-blue: #0af → #003c6e
    const lp = p / 0.28;
    return lerpColor([0,180,220], [0,60,140], lp);
  } else if (p < 0.55) {
    // blue → acid violet
    const lp = (p - 0.28) / 0.27;
    return lerpColor([0,60,140], [100,0,200], lp);
  } else {
    // violet → deep red
    const lp = (p - 0.55) / 0.45;
    return lerpColor([100,0,200], [180,0,20], lp);
  }
}
function getAccent(t) {
  const p = t / TOTAL;
  if (p < 0.28) return [0,0,0];
  if (p < 0.55) {
    const lp = (p-0.28)/0.27;
    return lerpColor([0,0,0],[255,220,0],lp);
  }
  return [255,220,0];
}
function lerpColor(a,b,t) {
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}
function rgb(c,a=1){ return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

// ─── GLITCH INTENSITY ────────────────────────────────────────────────────────
function glitchAmt(t) {
  const p = t / TOTAL;
  if (p < 0.15) return 0;
  if (p < 0.28) return (p-0.15)/0.13 * 0.15;
  if (p < 0.45) return 0.15 + (p-0.28)/0.17 * 0.25;
  return 0.4 + (p-0.45)/0.55 * 0.6;
}

// ─── NOISE / SCANLINES ───────────────────────────────────────────────────────
function drawScanlines(alpha) {
  ctx.save();
  for(let y=0;y<H;y+=4){
    ctx.fillStyle=`rgba(0,0,0,${alpha*0.5})`;
    ctx.fillRect(0,y,W,2);
  }
  ctx.restore();
}

let noiseCanvas=null,noiseCtx2=null;
function drawNoise(alpha) {
  if(alpha<0.02) return;
  if(!noiseCanvas){
    noiseCanvas=document.createElement('canvas');
    noiseCanvas.width=W;noiseCanvas.height=H;
    noiseCtx2=noiseCanvas.getContext('2d');
  }
  const img=noiseCtx2.createImageData(W,H);
  const d=img.data;
  const density=alpha*0.2;
  for(let i=0;i<d.length;i+=4){
    if(Math.random()<density){
      const v=Math.floor(Math.random()*255);
      d[i]=d[i+1]=d[i+2]=v;
      d[i+3]=Math.floor(Math.random()*160+40);
    }
  }
  noiseCtx2.putImageData(img,0,0);
  ctx.save();
  ctx.globalAlpha=Math.min(1,alpha*1.5);
  ctx.drawImage(noiseCanvas,0,0);
  ctx.restore();
}

// ─── HORIZONTAL GLITCH STRIPS ────────────────────────────────────────────────
function drawGlitchStrips(ga) {
  if(ga<0.05) return;
  const count = Math.floor(ga*15);
  for(let i=0;i<count;i++){
    if(Math.random()>ga*0.8) continue;
    const y = Math.random()*H;
    const h = Math.random()*40+2;
    const dx = (Math.random()-0.5)*W*0.15*ga;
    ctx.save();
    ctx.globalAlpha = 0.6+Math.random()*0.4;
    // copy strip with offset — just color rect for speed
    const bg = getBG(t);
    const r = Math.random();
    if(r<0.33) ctx.fillStyle=`rgb(255,0,80)`;
    else if(r<0.66) ctx.fillStyle=`rgb(0,255,200)`;
    else ctx.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`;
    ctx.fillRect(dx, y, W, h);
    ctx.restore();
  }
}

// ─── PIXEL CORRUPTION BLOCKS ─────────────────────────────────────────────────
function drawCorruptBlocks(ga) {
  if(ga<0.2) return;
  const count = Math.floor(ga*20);
  for(let i=0;i<count;i++){
    if(Math.random()>ga*0.5) continue;
    const x=Math.floor(Math.random()*(W/8))*8;
    const y=Math.floor(Math.random()*(H/8))*8;
    const w=Math.floor(Math.random()*30+1)*8;
    const h=Math.floor(Math.random()*20+1)*8;
    ctx.save();
    ctx.globalAlpha=Math.random()*0.8;
    const r=Math.floor(Math.random()*256),g=Math.floor(Math.random()*256),b2=Math.floor(Math.random()*256);
    ctx.fillStyle=`rgb(${r},${g},${b2})`;
    ctx.fillRect(x,y,w,h);
    ctx.restore();
  }
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
function drawBG() {
  const bg = getBG(t);
  ctx.fillStyle = rgb(bg);
  ctx.fillRect(0,0,W,H);
  
  // grid lines
  const ga = glitchAmt(t);
  ctx.save();
  ctx.globalAlpha = 0.06 + ga*0.04;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  
  // vignette
  const vig = ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);
}

// ─── TICKER / RUNNING TEXT AT BOTTOM ─────────────────────────────────────────
const tickerTexts = [
  "U.S. PATENT NO. 5,341,457  ·  PERCEPTUAL CODING OF AUDIO SIGNALS  ·  FILED: AUG 20 1993  ·  ALCATEL-LUCENT v. MICROSOFT CORP.  ·  SAN DIEGO FEDERAL COURT  ·  VERDICT: 1,520,000,000$  ·  FEB 22 2007  ·  FRAUNHOFER IIS LICENSE: 16M$  ·  DIFFERENT PATENT  ·  UNKNOWN AT TIME OF LICENSING  ·  ",
  "FORGENT NETWORKS v. JPEG COMMITTEE  ·  U.S. PATENT 4,698,672  ·  105M$ COLLECTED  ·  UNISYS CORP. GIF PATENT  ·  LZW COMPRESSION  ·  5000$ PER WEBSITE  ·  BURN ALL GIFS 1999  ·  MP3 PATENT POOL  ·  MPEG-LA  ·  IDEAS ARE PATENTABLE  ·  NOT IMPLEMENTATIONS  ·  "
];
let tickerOffset = 0;

function drawTicker() {
  const p = t/TOTAL;
  const tickText = p < 0.45 ? tickerTexts[0] : tickerTexts[1];
  ctx.save();
  ctx.font = '500 28px "IBM Plex Mono"';
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, H-60, W, 60);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  tickerOffset -= 2.5;
  const tw = ctx.measureText(tickText).width;
  if(tickerOffset < -tw) tickerOffset = 0;
  const reps = Math.ceil(W / tw) + 2;
  for(let i=0;i<reps;i++){
    ctx.fillText(tickText, tickerOffset + i*tw, H-20);
  }
  ctx.restore();
}

// ─── SCENE MANAGER ───────────────────────────────────────────────────────────
// Scene 1: 0–5s    — Date/location card
// Scene 2: 5–14s   — Army of lawyers visualization
// Scene 3: 14–21s  — Paid the license / trap reveal
// Scene 4: 21–28s  — $1.52B verdict impact
// Scene 5: 28–38s  — The mechanics: 4 formats, same pattern
// Scene 6: 38–48s  — Patent on IDEAS not implementations
// Scene 7: 48–58s  — One programmer surrounded by patents / screen breaks

function fadeIn(elapsed, dur) { return Math.min(1, elapsed/dur); }
function fadeOut(elapsed, total, fadeDur) { return Math.max(0, 1-(elapsed-(total-fadeDur))/fadeDur); }
function inOut(elapsed, dur) { return Math.min(1, elapsed/dur) * Math.max(0, 1-(elapsed-(dur*0.7))/(dur*0.3)); }

// ─── SCENE 0: FULL-SCREEN MP3 ────────────────────────────────────────────────
function drawScene0(el) {
  const alpha = 1;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Pulsing scale on beat
  const pulse = 1 + Math.sin(el/BEAT*Math.PI*2)*0.018;

  ctx.save();
  ctx.translate(W/2, H/2 + H*0.07);
  ctx.scale(pulse, pulse);
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // Giant MP3
  ctx.font=`700 ${Math.floor(H*0.85)}px "Bebas Neue"`;
  ctx.fillStyle='rgba(0,0,60,0.15)';
  ctx.fillText('MP3', 8, 8);
  ctx.fillStyle='rgba(0,0,0,0.95)';
  ctx.fillText('MP3', 0, 0);
  ctx.textBaseline='alphabetic';
  ctx.restore();

  // thin top/bottom lines
  ctx.strokeStyle='rgba(0,0,0,0.5)';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,H*0.06);ctx.lineTo(W,H*0.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H*0.94);ctx.lineTo(W,H*0.94);ctx.stroke();

  // small label bottom right
  ctx.textAlign='right';
  ctx.font=MONO(300,28);
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillText('MPEG-1 AUDIO LAYER III · 1993', W-40, H-40);

  ctx.restore();
}

// ─── SCENE 1: MICROSOFT PAYS HONESTLY ───────────────────────────────────────
function drawScene1(el) {
  const alpha = 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Title at top
  ctx.textAlign='center';
  ctx.font=CYR(700,70);
  ctx.fillStyle='#000';
  ctx.fillText('С MP3 — ДАЖЕ ЧЕСТНОСТЬ НЕ СПАСАЛА', W/2, H*0.1);

  // Central receipt / payment card
  const cx=W/2, cy=H*0.48, bw=W*0.42, bh=H*0.52;
  ctx.fillStyle='rgba(0,0,0,0.88)';
  ctx.fillRect(cx-bw/2, cy-bh/2, bw, bh);
  // green top bar
  ctx.fillStyle='rgba(0,200,100,0.9)';
  ctx.fillRect(cx-bw/2, cy-bh/2, bw, 10);

  ctx.textAlign='center';
  ctx.font=CYR(700,52);
  ctx.fillStyle='rgba(0,220,110,0.95)';
  ctx.fillText('✓  ЛИЦЕНЗИЯ ОПЛАЧЕНА', cx, cy-bh/2+75);

  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font=MONO(400,30);
  ctx.fillText('Fraunhofer IIS — официальный держатель', cx, cy-bh/2+130);
  ctx.fillText('патентов MP3', cx, cy-bh/2+168);

  ctx.font=BEBA(90);
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.fillText('16,000,000$', cx, cy-bh/2+275);

  ctx.font=MONO(300,26);
  ctx.fillStyle='rgba(200,255,200,0.8)';
  ctx.fillText('500+ других компаний — та же лицензия', cx, cy-bh/2+325);
  ctx.fillText('Apple · Sony · Nokia · Samsung · Creative', cx, cy-bh/2+360);

  ctx.font=CYR(400,28);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('Microsoft сыграла по правилам.', cx, cy-bh/2+420);
  ctx.fillText('Заплатила всем, кому надо.', cx, cy-bh/2+458);

  ctx.restore();
}

// ─── SCENE 2: THE HIDDEN PATENT TRAP ────────────────────────────────────────
function drawScene2(el) {
  const alpha = 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Title
  ctx.textAlign='center';
  ctx.font=CYR(700,65);
  ctx.fillStyle='#000';
  ctx.fillText('ПОТОМ ОКАЗАЛОСЬ — СУЩЕСТВУЕТ ДРУГОЙ ПАТЕНТ', W/2, H*0.1);

  // Two patent boxes
  const lx=W*0.06, ly=H*0.16, bw=W*0.4, bh=H*0.58;
  const rx=W*0.54;

  // LEFT: Fraunhofer — paid, known
  ctx.fillStyle='rgba(0,0,0,0.88)';
  ctx.fillRect(lx,ly,bw,bh);
  ctx.fillStyle='rgba(0,200,100,0.9)';
  ctx.fillRect(lx,ly,bw,8);

  ctx.textAlign='center';
  ctx.font=CYR(700,48);
  ctx.fillStyle='rgba(0,220,110,0.95)';
  ctx.fillText('✓  FRAUNHOFER IIS', lx+bw/2, ly+65);
  ctx.font=MONO(400,26);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('U.S. PATENT RE39,080', lx+bw/2, ly+115);
  ctx.fillText('"Rate Loop Processor"', lx+bw/2, ly+150);
  ctx.font=BEBA(60);
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.fillText('16M$ PAID', lx+bw/2, ly+230);
  ctx.font=MONO(300,24);
  ctx.fillStyle='rgba(200,255,200,0.8)';
  ctx.fillText('Microsoft + 500 других компаний', lx+bw/2, ly+285);
  ctx.fillText('официально лицензировали', lx+bw/2, ly+318);
  ctx.font=CYR(400,26);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('Подали, получили, закрыли вопрос.', lx+bw/2, ly+370);
  ctx.fillText('Так думали все.', lx+bw/2, ly+405);

  // RIGHT: Bell Labs / Lucent — hidden, emerges
  const revealP = Math.min(1, el/3000);
  ctx.globalAlpha = alpha * revealP;

  // Red glow
  const rg = ctx.createRadialGradient(rx+bw/2,ly+bh/2,50,rx+bw/2,ly+bh/2,bw*0.8);
  rg.addColorStop(0,`rgba(255,0,30,${revealP*0.4})`);
  rg.addColorStop(1,'rgba(255,0,30,0)');
  ctx.fillStyle=rg;
  ctx.fillRect(rx-40,ly-40,bw+80,bh+80);

  ctx.fillStyle='rgba(10,0,0,0.92)';
  ctx.fillRect(rx,ly,bw,bh);
  ctx.fillStyle='rgba(255,0,30,0.9)';
  ctx.fillRect(rx,ly,bw,8);

  ctx.textAlign='center';
  ctx.font=CYR(700,48);
  ctx.fillStyle='rgba(255,40,40,0.98)';
  ctx.fillText('?  BELL LABS / LUCENT', rx+bw/2, ly+65);
  ctx.font=MONO(400,26);
  ctx.fillStyle='rgba(255,180,180,0.9)';
  ctx.fillText('U.S. PATENT NO. 5,341,457', rx+bw/2, ly+115);
  ctx.fillText('"Perceptual Coding of Audio Signals"', rx+bw/2, ly+150);

  ctx.globalAlpha = alpha * Math.min(1,(el-1500)/1500);
  ctx.font=CYR(700,44);
  ctx.fillStyle='rgba(255,80,80,0.95)';
  ctx.fillText('СТАТУС: ДОРМАНТНЫЙ', rx+bw/2, ly+230);
  ctx.font=CYR(700,36);
  ctx.fillStyle='rgba(255,200,200,0.9)';
  ctx.fillText('1993 → 2003', rx+bw/2, ly+278);
  ctx.fillText('10 ЛЕТ БЕЗ ДВИЖЕНИЯ', rx+bw/2, ly+320);

  ctx.globalAlpha = alpha * Math.min(1,(el-2500)/1000);
  ctx.font=CYR(400,26);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('Никто не предупредил Microsoft.', rx+bw/2, ly+380);
  ctx.fillText('Lucent активировал в 2004.', rx+bw/2, ly+415);

  // Arrow between boxes
  ctx.globalAlpha = alpha * Math.min(1,(el-3500)/800);
  ctx.strokeStyle='rgba(255,50,50,0.9)';
  ctx.lineWidth=8;
  ctx.setLineDash([18,7]);
  ctx.beginPath();
  ctx.moveTo(lx+bw+15, ly+bh/2);
  ctx.lineTo(rx-15, ly+bh/2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,50,50,0.9)';
  ctx.beginPath();
  ctx.moveTo(rx-15,ly+bh/2);
  ctx.lineTo(rx-50,ly+bh/2-22);
  ctx.lineTo(rx-50,ly+bh/2+22);
  ctx.closePath();
  ctx.fill();
  // label on arrow
  ctx.textAlign='center';
  ctx.font=CYR(700,28);
  ctx.fillStyle='rgba(255,50,50,0.95)';
  ctx.fillText('РАЗНЫЕ ПАТЕНТЫ', W/2, ly+bh/2-20);
  ctx.font=CYR(300,22);
  ctx.fillStyle='rgba(0,0,0,0.9)';
  ctx.fillText('об этом никто не знал', W/2, ly+bh/2+20);

  ctx.restore();
}

// ─── SCENE 3: ARMY OF LAWYERS + COURT ───────────────────────────────────────
let lawyerCache = null;
function getLawyerPositions() {
  if(lawyerCache) return lawyerCache;
  lawyerCache = [];
  for(let row=0; row<7; row++){
    for(let col=0; col<14; col++){
      lawyerCache.push({
        side: 'msft',
        x: W*0.44 + col*88 + (row%2)*44,
        y: H*0.25 + row*88,
        delay: (row*14+col)*25
      });
    }
  }
  for(let row=0; row<4; row++){
    for(let col=0; col<5; col++){
      lawyerCache.push({
        side: 'alc',
        x: W*0.04 + col*88,
        y: H*0.32 + row*88,
        delay: (row*5+col)*55
      });
    }
  }
  return lawyerCache;
}

function drawLawyer(x,y,color,scale=1,briefcase=false) {
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(0,-52,16,0,Math.PI*2);ctx.fill();
  ctx.fillRect(-18,-40,36,48);
  ctx.fillRect(-16,8,14,32);
  ctx.fillRect(2,8,14,32);
  if(briefcase){
    ctx.strokeStyle=color;ctx.lineWidth=3;
    ctx.strokeRect(22,-20,22,16);
    ctx.beginPath();ctx.moveTo(27,-20);ctx.lineTo(27,-26);ctx.lineTo(39,-26);ctx.lineTo(39,-20);ctx.stroke();
  }
  ctx.restore();
}

function drawScene3(el) {
  const alpha = 1;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Title
  ctx.textAlign='center';
  ctx.font=CYR(700,68);
  ctx.fillStyle='#000';
  ctx.fillText('MICROSOFT НАНЯЛ АРМИЮ ЮРИСТОВ', W/2, H*0.08);

  // VS — higher, in the middle area
  ctx.font='700 220px "Bebas Neue"';
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.textAlign='center';
  ctx.fillText('VS', W*0.27, H*0.52);

  // Labels
  ctx.font=CYR(700,46);
  ctx.fillStyle='#000';
  ctx.textAlign='left';
  ctx.fillText('ALCATEL-LUCENT', W*0.04, H*0.18);
  ctx.font=CYR(400,24);
  ctx.fillText('ИСТЕЦ · патент на руках', W*0.04, H*0.225);

  ctx.textAlign='right';
  ctx.font=CYR(700,46);
  ctx.fillStyle='#000';
  ctx.fillText('MICROSOFT', W*0.96, H*0.18);
  ctx.font=CYR(400,24);
  ctx.fillText('ОТВЕТЧИК · армия юристов', W*0.96, H*0.225);

  // Lawyers — pushed lower: start at H*0.32
  const lawyers = getLawyerPositions();
  lawyers.forEach(l => {
    const appeared = Math.max(0, el - l.delay) / 350;
    const sc = Math.min(1, appeared);
    if(sc<=0) return;
    // shift lawyers down by +80px
    const color = l.side==='msft' ? '#0a0a1a' : '#001a0a';
    ctx.globalAlpha = alpha * Math.min(1, appeared);
    drawLawyer(l.x, l.y + 80, color, sc*0.82, l.side==='msft');
  });

  // Bottom: CORRECT message — even an army couldn't find the patent
  ctx.globalAlpha = alpha * Math.min(1,(el-5000)/1200);
  ctx.fillStyle='rgba(0,0,0,0.88)';
  ctx.fillRect(W*0.06, H*0.855, W*0.88, 120);
  ctx.textAlign='center';
  ctx.font=CYR(700,40);
  ctx.fillStyle='rgba(255,255,255,0.97)';
  ctx.fillText('НО ДАЖЕ АРМИЯ ЮРИСТОВ НЕ НАШЛА СКРЫТЫЙ ПАТЕНТ', W/2, H*0.855+52);
  ctx.font=CYR(400,28);
  ctx.fillStyle='rgba(200,230,255,0.88)';
  ctx.fillText('Патент Bell Labs пролежал тихо 10 лет — и никто не знал о его существовании', W/2, H*0.855+96);

  ctx.restore();
}

// ─── SCENE 4: $1.52B IMPACT ──────────────────────────────────────────────────
function drawScene4(el) {
  const alpha = 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Dark overlay to ensure contrast
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,W,H);

  // Big number — white
  const sc = 0.5 + Math.min(0.5, el/1000);
  ctx.save();
  ctx.translate(W/2, H*0.36);
  ctx.scale(sc,sc);

function drawFormatCard(x,y,w,h,fmt,reveal,progress) {
  ctx.save();
  ctx.translate(x,y);

  // Card bg — turns full red as reveal progresses
  const rp = Math.min(1, Math.max(0,(reveal-0.1)/0.5));
  const bgR = Math.floor(rp*180), bgG=0, bgB=0;
  ctx.fillStyle=`rgb(${bgR},${bgG},${bgB})`;
  ctx.fillRect(0,0,w,h);
  // dark base when not revealed
  if(rp < 1){
    ctx.fillStyle=`rgba(0,0,0,${0.9*(1-rp)})`;
    ctx.fillRect(0,0,w,h);
  }

  ctx.textAlign='center';
  ctx.font=BEBA(Math.floor(h*0.22));
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.fillText(fmt.name, w/2, h*0.28);

  ctx.font=MONO(400,22);
  ctx.fillStyle='rgba(180,220,255,0.85)';
  ctx.fillText(`CREATED ${fmt.year}`, w/2, h*0.36);

  const barY = h*0.45;
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(w*0.1, barY, w*0.8, 12);
  ctx.fillStyle=`rgba(${rp>0.3?255:0},${rp>0.3?50:220},${rp>0.3?50:150},0.7)`;
  ctx.fillRect(w*0.1, barY, w*0.8*Math.min(1,progress*2), 12);

  ctx.font=MONO(300,20);
  ctx.fillStyle='rgba(200,200,200,0.8)';
  ctx.fillText(`DORMANT: ${fmt.dormant}`, w/2, barY+35);

  if(reveal > 0.1) {
    ctx.globalAlpha = Math.min(1,(reveal-0.1)/0.4);

    ctx.textAlign='center';
    ctx.font=MONO(700,28);
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.fillText('⚠  PATENT CLAIM', w/2, h*0.6);
    ctx.font=MONO(600,22);
    ctx.fillStyle='rgba(255,220,220,0.98)';
    ctx.fillText(fmt.pHolder, w/2, h*0.68);
    ctx.font=MONO(400,19);
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText(fmt.claim, w/2, h*0.76);
  }

  ctx.restore();
}

// ─── SCENE 7: ONE PROGRAMMER, PATENT WALLS CRUSH + HEAD FALLS ───────────────
function drawScene7(el) {
  const alpha = 1;

  const sceneDur = 18602;
  const p = Math.min(1, el/sceneDur);
  const easedP = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;

  ctx.save();
  ctx.globalAlpha = alpha;

  const px = W/2;

  // ── ВСЯ ГЕОМЕТРИЯ СТРОИТСЯ СВЕРХУ ВНИЗ ОТ ГОЛОВЫ ──
  const headR   = 44;
  const headCY  = H/2 - 10;          // центр головы = центр экрана - 10px

  const neckH   = 24;
  const neckTop = headCY + headR;     // верх шеи
  const neckBot = neckTop + neckH;    // низ шеи = верх плеч

  const torsoH  = 105;
  const torsoBot = neckBot + torsoH;  // низ торса

  // Сиденье стула прямо под торсом
  const seatTop = torsoBot + 8;
  const seatH   = 16;
  const seatBot = seatTop + seatH;

  // Стол: столешница на уровне середины предплечий — чуть выше торсабота
  const deskTop = neckBot + torsoH*0.55;   // ~уровень локтей
  const deskH   = 24;

  // Ножки: все до одного пола
  const floorY  = seatBot + 150;
  const deskLegH = floorY - (deskTop + deskH);
  const chairLegH = floorY - seatBot;

  // Центр круга патентов
  const wallCY = H/2;

  // ── AMBIENT GLOW ──
  const gr = ctx.createRadialGradient(px, wallCY, 20, px, wallCY, 420*(1-easedP*0.65));
  gr.addColorStop(0,`rgba(255,200,50,${0.18*(1-easedP*0.5)})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = '#000';

  // 1. НОЖКИ
  ctx.fillRect(px-168, deskTop+deskH, 24, deskLegH);
  ctx.fillRect(px+144, deskTop+deskH, 24, deskLegH);
  ctx.fillRect(px-52, seatBot, 16, chairLegH);
  ctx.fillRect(px+36, seatBot, 16, chairLegH);

  // 2. СТОЛЕШНИЦА + СИДЕНЬЕ + СПИНКА
  ctx.fillRect(px-180, deskTop, 360, deskH);
  ctx.fillRect(px-54, seatTop, 108, seatH);
  ctx.fillRect(px-50, seatTop-80, 14, 80);
  ctx.fillRect(px+36, seatTop-80, 14, 80);
  ctx.fillRect(px-50, seatTop-80, 100, 16);

  // 3. МОНИТОР — чёрный экран
  ctx.fillRect(px-106, deskTop-164, 212, 140);
  ctx.fillRect(px-94,  deskTop-152, 188, 116);
  ctx.fillRect(px-13,  deskTop-22,  26,  24);
  ctx.fillRect(px-42,  deskTop,     84,  12);

  // 4. ТЕЛО — после монитора, перекрывает его
  ctx.fillRect(px-34, neckBot, 68, torsoH);
  ctx.fillRect(px-13, neckTop, 26, neckH);
  ctx.fillRect(px-64, neckBot+4, 30, 70);
  ctx.fillRect(px+34, neckBot+4, 30, 70);
  ctx.fillRect(px-100, deskTop-18, 70, 20);
  ctx.fillRect(px+30,  deskTop-18, 70, 20);
  ctx.fillRect(px-38, torsoBot+4, 32, 22);
  ctx.fillRect(px+6,  torsoBot+4, 32, 22);
  ctx.fillRect(px-38, torsoBot+26, 22, 80);
  ctx.fillRect(px+16, torsoBot+26, 22, 80);
  ctx.fillRect(px-44, torsoBot+106, 32, 14);
  ctx.fillRect(px+12, torsoBot+106, 32, 14);

  // 5. КОД НА ЭКРАНЕ
  ctx.fillStyle='rgba(0,255,100,0.82)';
  ctx.font=MONO(300,14);
  ctx.textAlign='left';
  const codeL=['int decode_mp3(','  uint8_t *in,','  size_t n){','  // my code','  // from scratch','  return pcm;}'];
  codeL.forEach((ln,i)=>ctx.fillText(ln, px-86, deskTop-138+i*19));
  if(Math.floor(el/500)%2===0){
    ctx.fillStyle='rgba(0,255,100,0.9)';
    ctx.fillRect(px-86, deskTop-138+codeL.length*19, 10, 16);
  }

  // 6. ПАТЕНТНЫЕ СТЕНЫ
  const wallCount = 32;
  const startDist = 680, endDist = 48;
  const dist = startDist - (startDist-endDist)*easedP;
  for(let i=0; i<wallCount; i++){
    const angle = (i/wallCount)*Math.PI*2;
    const wx = px + Math.cos(angle)*dist;
    const wy = wallCY + Math.sin(angle)*dist;
    const ww=124, wh=248;
    ctx.save();
    ctx.translate(wx, wy);
    ctx.rotate(angle + Math.PI/2);
    ctx.globalAlpha = alpha * Math.min(1, easedP*2.5) * 0.95;
    ctx.fillStyle='#080000';
    ctx.fillRect(-ww/2,-wh/2,ww,wh);
    const br = 0.5+easedP*0.5;
    ctx.strokeStyle=`rgba(255,${Math.floor(15+easedP*20)},15,${br})`;
    ctx.lineWidth=3+easedP*4;
    ctx.strokeRect(-ww/2,-wh/2,ww,wh);
    ctx.fillStyle=`rgba(200,0,20,${0.5+easedP*0.5})`;
    ctx.fillRect(-ww/2,-wh/2,ww,7);
    ctx.textAlign='center';
    ctx.font=MONO(700,17);
    ctx.fillStyle='rgba(255,80,80,0.95)';
    ctx.fillText('PATENT', 0,-wh/2+24);
    const pNums=['5,341,457','4,698,672','RE39,080','6,044,157','5,703,999','7,212,872','5,960,116','4,901,075',
                 '6,119,153','5,844,508','7,006,555','4,922,516','6,009,399','5,491,754','6,700,958','4,969,040'];
    const pDescs=['Audio Coding','Image Compr.','Rate Control','Video Codec','Data Stream','Compression','Signal Proc','Transform Alg',
                  'Huffman Enc.','DCT Method','Block Coding','Perceptual','Entropy Cod.','Chroma Sub.','Motion Est.','Frame Pred.'];
    ctx.font=MONO(400,12);
    ctx.fillStyle='rgba(255,180,180,0.8)';
    ctx.fillText(pNums[i%16],0,-wh/2+42);
    ctx.fillStyle='rgba(200,200,200,0.7)';
    ctx.fillText(pDescs[i%16],0,-wh/2+59);
    ctx.font=BEBA(60);
    ctx.fillStyle=`rgba(180,0,20,${0.2+easedP*0.3})`;
    ctx.fillText('§',0,18);
    ctx.font=MONO(300,10);
    ctx.fillStyle='rgba(150,150,150,0.5)';
    ctx.fillText('35 U.S.C. § 154',0,wh/2-13);
    ctx.restore();
  }

  // 7. ГОЛОВА
  const detachStart = 0.84;
  const detachP = Math.max(0,(easedP-detachStart)/(1-detachStart));
  const fallSec = detachP*(sceneDur*(1-detachStart))/1000;
  const vy0 = -200, gravity = 1800;
  const headDrawY = detachP===0 ? headCY : headCY + vy0*fallSec + 0.5*gravity*fallSec*fallSec;
  const headDrawX = detachP===0 ? px : px + 90*Math.sin(fallSec*2.8);
  const headRot   = detachP*5.5;

  // линия среза — убрана (рисовалась поверх патентов)

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(headDrawX, headDrawY);
  ctx.rotate(headRot);
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(0,0,headR,0,Math.PI*2);ctx.fill();
  if(detachP===0) ctx.fillRect(-13,headR-5,26,18);
  ctx.restore();

  if(detachP>0 && headDrawY>H*0.76){
    const sp=Math.min(1,(headDrawY-H*0.76)/(floorY-H*0.76));
    ctx.save();
    ctx.globalAlpha=alpha*sp*0.2;
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(headDrawX,floorY+6,Math.max(1,headR*(1+sp*0.5)),7,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ТЕКСТ
  const textP = Math.max(0,(easedP-0.08)/0.38);
  ctx.globalAlpha = alpha*Math.min(1,textP);
  ctx.fillStyle='rgba(0,0,0,0.87)';
  ctx.fillRect(0,H*0.05,W,95);
  ctx.textAlign='center';
  ctx.font=CYR(700,78);
  ctx.fillStyle='rgba(255,255,255,0.98)';
  ctx.fillText('ТЫ НЕ МОЖЕШЬ НАПИСАТЬ ВИДЕОПЛЕЕР', W/2, H*0.05+76);

  ctx.globalAlpha = alpha*Math.min(1,Math.max(0,(easedP-0.25)/0.28));
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.fillRect(0,H*0.91,W,70);
  ctx.font=CYR(400,34);
  ctx.fillStyle='rgba(200,200,200,0.9)';
  ctx.fillText('что говорить об одном программисте за своим компьютером?', W/2, H*0.91+48);

  if(easedP>0.90){
    const fp=(easedP-0.90)/0.10;
    ctx.globalAlpha=alpha*fp*0.38;
    ctx.fillStyle='rgba(200,0,10,0.5)';
    ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}


const SCENES = [
  { start: 0,     end: 2753,  fn: drawScene0 },
  { start: 2953,  end: 4310,  fn: drawScene1 },
  { start: 4510,  end: 10760, fn: drawScene2 },
  { start: 10960, end: 18027, fn: drawScene4 },
  { start: 18227, end: 27668, fn: drawScene3 },
  { start: 27868, end: 37168, fn: drawScene5 },
  { start: 37368, end: 47413, fn: drawScene6 },
  { start: 47613, end: 71215, fn: drawScene7 },
];

// Scene transition boundaries for glitch bursts
const TRANSITIONS = [2853, 4410, 10860, 18127, 27768, 37268, 47513];

function glitchTransitionBurst(t) {
  // Returns 0..1 burst intensity near each transition
  let burst = 0;
  TRANSITIONS.forEach(tr => {
    const d = Math.abs(t - tr);
    if(d < 400) burst = Math.max(burst, 1 - d/400);
  });
  return burst;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  if(!running) return;
  if(!startTime) startTime=ts;
  t = ts - startTime;
  beat = t / BEAT;

  if(t > TOTAL) { running=false; return; }

  const ga = glitchAmt(t);
  const tb = glitchTransitionBurst(t); // extra burst at transitions
  const gaTotal = Math.min(1, ga + tb);

  // BG
  drawBG();

  // White flash at transition peak
  if(tb > 0.6) {
    ctx.save();
    ctx.globalAlpha = (tb-0.6)/0.4 * 0.85;
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // glitch strips behind
  drawGlitchStrips(gaTotal * 0.5);

  // draw active scenes
  SCENES.forEach(s=>{
    if(t >= s.start && t <= s.end) {
      s.fn(t - s.start);
    }
  });

  // overlay glitch
  drawGlitchStrips(gaTotal * 0.5);
  drawCorruptBlocks(gaTotal);

  // heavy horizontal tear at transitions
  if(tb > 0.3) {
    const tears = Math.floor(tb * 25);
    for(let i=0;i<tears;i++){
      const y=Math.random()*H;
      const h=Math.random()*60+3;
      const dx=(Math.random()-0.5)*W*0.3*tb;
      ctx.save();
      ctx.globalAlpha=tb*0.7;
      ctx.fillStyle=Math.random()<0.5?`rgb(${Math.random()*255|0},0,0)`:`rgb(0,${Math.random()*200|0},${Math.random()*255|0})`;
      ctx.fillRect(dx,y,W,h);
      ctx.restore();
    }
  }

  drawScanlines(0.08 + gaTotal*0.15);
  drawNoise(gaTotal);
  drawTicker();

  if(gaTotal > 0.3) {
    ctx.save();
    ctx.globalAlpha = gaTotal * 0.25;
    ctx.globalCompositeOperation = 'screen';
    const offX = (Math.random()-0.5)*gaTotal*30;
    ctx.fillStyle='rgba(255,0,0,0.1)';
    ctx.fillRect(offX,0,W,H);
    ctx.fillStyle='rgba(0,100,255,0.1)';
    ctx.fillRect(-offX,0,W,H);
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.font=MONO(300,22);
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.textAlign='right';
  ctx.fillText(`${(t/1000).toFixed(1)}s / 71.2s`, W-20, 35);
  ctx.restore();

  requestAnimationFrame(frame);
}

function start() {
  startTime = null;
  t = 0;
  running = true;
  tickerOffset = 0;
  requestAnimationFrame(frame);
}

document.addEventListener('keydown', e=>{
  if(e.key==='r'||e.key==='к'||e.key==='R'||e.key==='К') start();
});

// draw idle frame
drawBG();
ctx.save();
ctx.textAlign='center';
ctx.font='700 100px "Bebas Neue"';
ctx.fillStyle='rgba(0,0,0,0.8)';
ctx.fillText('PATENT WARS', W/2, H/2-30);
ctx.font=CYR(400,36);
ctx.fillText('НАЖМИТЕ R ДЛЯ ЗАПУСКА', W/2, H/2+50);
ctx.restore();
</script>
