<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FFmpeg Timeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080a;width:2560px;height:1440px;overflow:hidden;user-select:none}
canvas{position:absolute;top:0;left:0;width:2560px;height:1440px}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none;opacity:0;transition:opacity .45s}
#ui.visible{opacity:1}
#filters{position:absolute;top:28px;left:50%;transform:translateX(-50%);display:flex;gap:12px;pointer-events:all}
.fb{font-family:'Oswald',sans-serif;font-weight:600;font-size:24px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 28px;border:2px solid rgba(255,255,255,.12);background:rgba(8,8,10,.88);color:rgba(255,255,255,.35);cursor:pointer;transition:all .3s}
.fb:hover{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.8)}
.fb.on[data-f="all"]{border-color:#fff;color:#fff;background:rgba(255,255,255,.08);text-shadow:0 0 24px rgba(255,255,255,.5)}
.fb.on[data-f="patents"]{border-color:#ff4455;color:#fff;background:rgba(255,68,85,.15);text-shadow:0 0 20px #ff4455}
.fb.on[data-f="bellard"]{border-color:#00ccff;color:#fff;background:rgba(0,204,255,.12);text-shadow:0 0 20px #00ccff}
.fb.on[data-f="ffmpeg"]{border-color:#44dd66;color:#fff;background:rgba(68,221,102,.12);text-shadow:0 0 20px #44dd66}
#hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:15px;color:rgba(255,255,255,.2);letter-spacing:2px;white-space:nowrap}
</style>
</head>
<body>
<canvas id="c" width="2560" height="1440"></canvas>
<div id="ui">
  <div id="filters">
    <button class="fb on" data-f="all">ВСЕ СОБЫТИЯ</button>
    <button class="fb" data-f="patents">ПАТЕНТНЫЕ ВОЙНЫ</button>
    <button class="fb" data-f="bellard">БЕЛЛАР</button>
    <button class="fb" data-f="ffmpeg">ИСТОРИЯ FFMPEG</button>
  </div>
  <div id="hint">ПРОБЕЛ — далее &nbsp;│&nbsp; Q — авто &nbsp;│&nbsp; F — обзор &nbsp;│&nbsp; H — меню &nbsp;│&nbsp; R — сброс</div>
</div>

<script>
const EV = [
  {year:1988,   t:"Основание MPEG",           d:"Кьяриглионе и Ясуда\n15 человек в Оттаве",cat:["patents"],col:"#ff3355"},
  {year:1989,   t:"Беллар пишет LZEXE",       d:"17 лет. Amstrad PC1512\nИгровые компании берут",cat:["bellard"],col:"#00ccff"},
  {year:1993,   t:"MPEG-1",                   d:"CD-ROM, ранний интернет\nПервое сжатие видео+стерео",cat:["patents"],col:"#ff4466"},
  {year:1995,   t:"MPEG-2",                   d:"DVD, цифровое ТВ, спутник\nФундамент видео на десятилетие",cat:["patents"],col:"#ff4466"},
  {year:1995.1, t:"Формула Беллара",          d:"BBP на 43% быстрее\n2.7 трлн знаков π дома",cat:["bellard"],col:"#00bbee"},
  {year:1998,   t:"MPEG-4 / H.264",           d:"Эпоха интернета. MP4\nОснова видео в сети",cat:["patents"],col:"#ff4466"},
  {year:1999,   t:"Трейлер «Скрытой угрозы»",d:"Эксклюзив QuickTime\n1M+ скачиваний за сутки",cat:["patents"],col:"#ff6633"},
  {year:1999.1, t:"Скандал RealPlayer",       d:"Тайная слежка за пользователями\nПервый крупный скандал эпохи",cat:["patents"],col:"#ff3355"},
  {year:1999.2, t:"Unisys vs GIF",            d:"$5000 с некоммерческих сайтов\n«Burn All GIFs Day» → PNG",cat:["patents"],col:"#ff3355"},
  {year:1999.3, t:"Жером Рота → DivX",        d:"Взлом кодека Microsoft за неделю\nКодек расходится сам",cat:["patents"],col:"#ff6633"},
  {year:2000,   t:"IOCCC — простое число",    d:"Вся программа на одном экране\nМесяцы вычислений",cat:["bellard"],col:"#00ccff"},
  {year:2000.1, t:"Беллар создаёт FFmpeg",    d:"Хочет смотреть ТВ на Linux\nFast Forward MPEG. C + ASM",cat:["bellard","ffmpeg"],col:"#ffcc00"},
  {year:2001,   t:"IOCCC — TinyCC",           d:"Компилятор C в 3 КБ\nОбычно — мегабайты и годы",cat:["bellard"],col:"#00bbee"},
  {year:2001.1, t:"VLC + FFmpeg",             d:"FFmpeg внутри. Открывает\nвсё без кодек-паков",cat:["ffmpeg"],col:"#ff9933"},
  {year:2002,   t:"Forgent vs JPEG",          d:"Патент пролежал 15 лет\n$105M с 30 компаний",cat:["patents"],col:"#ff3355"},
  {year:2003.1, t:"QEMU",                     d:"ОС внутри ОС\nФундамент AWS, Google Cloud",cat:["bellard"],col:"#00ccff"},
  {year:2003.2, t:"Xvid — бунт против DivX",  d:"Открытый форк\nDivX продан за $323M",cat:["patents","ffmpeg"],col:"#ff9933"},
  {year:2004,   t:"Нидермайер — лидер",       d:"Беллар уходит к QEMU\nКод каждый день, без выходных",cat:["ffmpeg"],col:"#44dd66"},
  {year:2005,   t:"YouTube берёт FFmpeg",     d:"Трое из PayPal\nВсе форматы → единый поток",cat:["ffmpeg"],col:"#55ee77"},
  {year:2006,   t:"Google Summer of Code",    d:"Студенты всего мира\nДесятки новых форматов",cat:["ffmpeg"],col:"#44dd66"},
  {year:2008,   t:"Система фильтров",         d:"Обрезка, масштаб, стабилизация\nВсё в одной программе",cat:["ffmpeg"],col:"#44dd66"},
  {year:2009,   t:"Microsoft vs патент MP3",  d:"$1.52 млрд за технологию\nза которую уже заплатили",cat:["patents"],col:"#ff3355"},
  {year:2010,   t:"VP8: FFmpeg > Google",     d:"Декодер добровольцев быстрее\nGoogle берёт код FFmpeg",cat:["ffmpeg"],col:"#55ee77"},
  {year:2011,   t:"Раскол FFmpeg / Libav",    d:"Мятежники захватывают сайт\nБеллар возвращает домен",cat:["ffmpeg"],col:"#ff3355"},
  {year:2011.1, t:"JSLinux",                  d:"Linux во вкладке браузера\nЭмулятор x86 на JavaScript",cat:["bellard"],col:"#00ccff"},
  {year:2012,   t:"Amarisoft",                d:"Базовая станция 4G в софте\n60+ стран",cat:["bellard"],col:"#00bbee"},
  {year:2013,   t:"HEVC + VP9 в FFmpeg",      d:"H.265 и открытый VP9 от Google\nОба реализованы в FFmpeg",cat:["ffmpeg"],col:"#44dd66"},
  {year:2015,   t:"Ubuntu/Debian → FFmpeg",   d:"Возвращаются к оригиналу",cat:["ffmpeg"],col:"#55ee77"},
  {year:2015.1, t:"Нидермайер уходит",        d:"14 лет в проекте\n11 лет лидером",cat:["ffmpeg"],col:"#44dd66"},
  {year:2016,   t:"FFmpeg 3.0 «Эйнштейн»",   d:"",cat:["ffmpeg"],col:"#44dd66"},
  {year:2018,   t:"Поддержка AV1",            d:"Лучшее качество\nменьший размер",cat:["ffmpeg"],col:"#55ee77"},
  {year:2019,   t:"QuickJS",                  d:"Движок JS. <400 КБ\n~100% тестов стандарта",cat:["bellard"],col:"#00ccff"},
  {year:2020,   t:"Libav мёртв",              d:"Официально заброшен",cat:["ffmpeg"],col:"#44dd66"},
  {year:2021,   t:"FFmpeg на Марсе",          d:"Perseverance. Код Беллара\nСнимки с другой планеты",cat:["ffmpeg","bellard"],col:"#ffcc00"},
  {year:2021.1, t:"JPEG XL, AVIF",            d:"Новые форматы изображений",cat:["ffmpeg"],col:"#44dd66"},
  {year:2021.2, t:"NNCP #1",                  d:"Сжатие нейросетями\n1-е место в бенчмарке",cat:["bellard"],col:"#00bbee"},
  {year:2023,   t:"ts_zip",                   d:"Сжатие текста через LLM",cat:["bellard"],col:"#00ccff"},
  {year:2024,   t:"TSAC",                     d:"Стерео при 7.5 кбит/с\nMP3: 128–320. В 20–40× сильнее",cat:["bellard"],col:"#00ccff"},
  {year:2025,   t:"FFmpeg 8.0 «Хаффман»",     d:"GPU, распознавание речи\n25 лет разработки",cat:["ffmpeg","bellard"],col:"#ffcc00"},
];

const chronoOrder = EV.map((_,i)=>i).sort((a,b)=>EV[a].year-EV[b].year);
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W=2560, H=1440;

// ── state
let revealed=new Set(), lastRevealed=-1;
let filter='all', sx=0, tsx=0, sxVel=0, cardAT={};
let zoomOut=false, zoomLevel=0, targetZoomLevel=0;
let uiVisible=false;
let autoplay=false, autoTimer=0, autoChronoIdx=0;
const AUTO_DELAY=2200;

// ── effects pools
let shocks=[];      // shockwave rings
let scanFlash=null; // { x (world), life, col }
let chromaLife=0;   // frames for chromatic aberration
let chromaX=0;      // screen x
let chromaCol='#fff';
// impact flash: full-screen momentary brightness
let impactLife=0;
let impactCol='#fff';

// ── layout constants
const TY=780, ML=200, MR=200, MINY=1987, MAXY=2025;
const CARD_W=420, CARD_PAD=16;
// Layout: year line (FY) at top, title (FT) below it, description (FD) below that
const FY=28, FT=27, FD=18;
const YR_Y=28,  // year baseline from card top
      TIT_Y=54, // title baseline
      DSC_Y=78, DSC_L=23;
function cardH(ev){
  const lines=ev.d?ev.d.split('\n').length:0;
  return lines>0?DSC_Y+lines*DSC_L+10:TIT_Y+10;
}

const OV_TY=720, OV_ML=180, OV_MR=180, OV_CW=260, OV_PAD=10;
const OFY=24, OFT=19, OFD=13, OTY=24, ODY=44, ODL=17, OYW=62;
function ovH(ev){return ev.d?ODY+ev.d.split('\n').length*ODL+6:34;}

// ── Nonlinear timeline: 1997-2004 zone gets 2.5× the pixels per year
// Piecewise: [MINY..Z0] normal, [Z0..Z1] expanded, [Z1..MAXY] normal
const Z0=1997, Z1=2004, EXPAND=1.6;
const NORMAL_PPY=135; // pixels per year in normal zones
const EXPAND_PPY=NORMAL_PPY*EXPAND;
// total world width:
const NORMAL_YEARS=(Z0-MINY)+(MAXY-Z1);
const EXPAND_YEARS=Z1-Z0;
const INNER_W=NORMAL_YEARS*NORMAL_PPY+EXPAND_YEARS*EXPAND_PPY;
const TW=Math.max(W,INNER_W+ML+MR+W*0.78);

function yearToX(yr){
  const b=Math.floor(yr),f=yr-b;
  const y=b+f*0.3; // sub-year fraction (same logic as before)
  let px;
  if(y<=Z0){
    px=(y-MINY)*NORMAL_PPY;
  } else if(y<=Z1){
    px=(Z0-MINY)*NORMAL_PPY+(y-Z0)*EXPAND_PPY;
  } else {
    px=(Z0-MINY)*NORMAL_PPY+(Z1-Z0)*EXPAND_PPY+(y-Z1)*NORMAL_PPY;
  }
  return ML+px;
}
function ovX(yr){const b=Math.floor(yr),f=yr-b;return OV_ML+(b-MINY+f*.3)/(MAXY-MINY)*(W-OV_ML-OV_MR);}
function getFiltered(){const o=[];revealed.forEach(i=>{if(filter==='all'||EV[i].cat.includes(filter))o.push(i);});return o;}

// ── layout cache
let cache={},cacheP={},ovCa={},ovCaP={};
function mkC(){
  cache={};cacheP={};ovCa={};ovCaP={};
  ['all','patents','bellard','ffmpeg'].forEach(f=>{cache[f]={};cacheP[f]=[];ovCa[f]={};ovCaP[f]=[];});
}
mkC();
const AG=32,BG=50,RG=6,hw=CARD_W/2;
function plN(i,fk){
  if(cache[fk][i])return;
  const ev=EV[i],x=yearToX(ev.year),h=cardH(ev),pl=cacheP[fk],cs=[];
  for(let r=0;r<20;r++){cs.push(-(AG+h+r*(h+RG)));cs.push(BG+r*(h+RG));}
  let best=cs[0];
  for(const cy of cs){const t={l:x-hw-4,r:x+hw+4,t:TY+cy-2,b:TY+cy+h+2};if(!pl.some(p=>t.l<p.r&&t.r>p.l&&t.t<p.b&&t.b>p.t)){best=cy;break;}}
  pl.push({l:x-hw-4,r:x+hw+4,t:TY+best-2,b:TY+best+cardH(ev)+2});cache[fk][i]={x,y:TY+best,h};
}
const OA=24,OB=36,OR=4,ohw=OV_CW/2;
function plO(i,fk){
  if(ovCa[fk][i])return;
  const ev=EV[i],x=ovX(ev.year),h=ovH(ev),pl=ovCaP[fk],cs=[];
  for(let r=0;r<20;r++){cs.push(-(OA+h+r*(h+OR)));cs.push(OB+r*(h+OR));}
  let best=cs[0];
  for(const cy of cs){const t={l:x-ohw-3,r:x+ohw+3,t:OV_TY+cy-2,b:OV_TY+cy+h+2};if(!pl.some(p=>t.l<p.r&&t.r>p.l&&t.t<p.b&&t.b>p.t)){best=cy;break;}}
  pl.push({l:x-ohw-3,r:x+ohw+3,t:OV_TY+best-2,b:OV_TY+best+ovH(ev)+2});ovCa[fk][i]={x,y:OV_TY+best,h};
}
function ensureAll(){revealed.forEach(i=>{if(filter==='all'||EV[i].cat.includes(filter)){plN(i,filter);plO(i,filter);}});}

// ── grain
const gC=document.createElement('canvas');gC.width=gC.height=512;const gX=gC.getContext('2d');
function mkG(){const d=gX.createImageData(512,512);for(let i=0;i<d.data.length;i+=4){const v=Math.random()*28;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=255;}gX.putImageData(d,0,0);}

// ── helpers
function rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)].join(',');}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── REVEAL
// In autoplay: camera starts immediately, card fades in after CARD_APPEAR_DELAY ms
const CARD_APPEAR_DELAY = 500; // ms — card appears mid-scroll

function revealEvent(evIdx){
  revealed.add(evIdx);
  lastRevealed=evIdx;
  ensureAll();
  const ev=EV[evIdx], ex=yearToX(ev.year);

  // camera target — LEFT side for autoplay, centre for manual
  // In autoplay we allow camera to go a bit past the normal right limit so last cards stay left
  if(autoplay) tsx=Math.max(0,Math.min(ex-W*.20,TW-W));
  else         tsx=Math.max(0,Math.min(ex-W*.50,TW-W));

  const dotX=ex, dotY=TY;

  if(autoplay){
    // Card starts invisible — timer sets cardAT so it appears mid-scroll
    cardAT[evIdx] = null; // null = not yet started
    setTimeout(()=>{
      cardAT[evIdx] = performance.now();
      // effects fire when card appears
      fireEffects(dotX, dotY, ev);
    }, CARD_APPEAR_DELAY);
  } else {
    cardAT[evIdx] = performance.now();
    fireEffects(dotX, dotY, ev);
  }
}

function fireEffects(dotX, dotY, ev){
  [
    {maxR:160, decay:.019, lw:3.0},
    {maxR:280, decay:.012, lw:1.8},
    {maxR:440, decay:.008, lw:1.0},
  ].forEach(cfg=>{
    shocks.push({x:dotX,y:dotY,r:10,maxR:cfg.maxR,life:1,decay:cfg.decay,col:ev.col,lineW:cfg.lw});
  });
  scanFlash={worldX:dotX, life:1, col:ev.col};
  impactLife=1; impactCol=ev.col;
  chromaLife=14; chromaCol=ev.col;
}

// ── DRAW: shockwaves
function drawShocks(){
  ctx.save();ctx.translate(-sx,0);
  for(let i=shocks.length-1;i>=0;i--){
    const s=shocks[i];
    s.r+=(s.maxR-s.r)*.12;
    s.life-=s.decay;
    if(s.life<=0){shocks.splice(i,1);continue;}
    const a=s.life*s.life;
    // outer ring
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${rgb(s.col)},${a*.65})`;
    ctx.lineWidth=s.lineW;
    ctx.stroke();
    // horizontal line flash along the timeline axis
    if(s.life>.6){
      const span=s.r*1.4, fa=(s.life-.6)/.4;
      const grad=ctx.createLinearGradient(s.x-span,s.y,s.x+span,s.y);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(.3,`rgba(${rgb(s.col)},${fa*.25})`);
      grad.addColorStop(.5,`rgba(${rgb(s.col)},${fa*.55})`);
      grad.addColorStop(.7,`rgba(${rgb(s.col)},${fa*.25})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;ctx.fillRect(s.x-span,s.y-2,span*2,4);
    }
  }
  ctx.restore();
}

// ── DRAW: scan flash (vertical beam)
function drawScanFlash(){
  if(!scanFlash)return;
  scanFlash.life-=.035;
  if(scanFlash.life<=0){scanFlash=null;return;}
  const a=Math.pow(scanFlash.life,1.5);
  const sx2=scanFlash.worldX-sx;
  const w=100*(1-scanFlash.life*.3); // narrows as it fades
  const grad=ctx.createLinearGradient(sx2-w,0,sx2+w,0);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(.35,`rgba(${rgb(scanFlash.col)},${a*.15})`);
  grad.addColorStop(.5, `rgba(${rgb(scanFlash.col)},${a*.50})`);
  grad.addColorStop(.65,`rgba(${rgb(scanFlash.col)},${a*.15})`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save();ctx.globalCompositeOperation='screen';
  ctx.fillStyle=grad;ctx.fillRect(sx2-w,0,w*2,H);
  ctx.restore();
}

// ── DRAW: impact flash (full screen)
function drawImpactFlash(){
  if(impactLife<=0)return;
  impactLife-=.06;
  if(impactLife<0)impactLife=0;
  const a=Math.pow(impactLife,2)*.08;
  if(a<.001)return;
  ctx.save();ctx.globalCompositeOperation='screen';
  ctx.fillStyle=`rgba(${rgb(impactCol)},${a})`;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ── DRAW: chromatic aberration
function drawChroma(){
  if(chromaLife<=0)return;
  const strength=chromaLife*2.2;
  // Draw current frame shifted, in screen/add mode, separately for two offsets
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.08;
  ctx.drawImage(C,-strength,0);
  ctx.drawImage(C,+strength,0);
  ctx.restore();
  chromaLife--;
}

// ── DRAW: cards
function drawCards(now,posMap,filtered,cw,pad,timeY,isOv){
  if(!filtered.length)return;
  for(let pass=0;pass<2;pass++){
    for(const fi of filtered){
      const isNew=fi===lastRevealed&&!zoomOut&&!isOv;
      if(pass===0&&isNew)continue;if(pass===1&&!isNew)continue;
      const p=posMap[fi];if(!p)continue;
      const ev=EV[fi],elapsed=cardAT[fi]!=null?(now-(cardAT[fi]||0))/1000:-1;
      const anim=elapsed<0?0:Math.min(1,elapsed*4.5);
      if(anim<=0)continue;
      const lx=p.x-cw/2;

      // connector dashed line
      ctx.save();ctx.globalAlpha=.36*anim;ctx.strokeStyle=ev.col;ctx.lineWidth=isOv?1:1.5;
      ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(p.x,timeY);ctx.lineTo(p.x,p.y+(p.y<timeY?p.h:0));ctx.stroke();ctx.setLineDash([]);ctx.restore();

      // dot on timeline
      ctx.save();ctx.globalAlpha=anim;
      ctx.beginPath();ctx.arc(p.x,timeY,isNew?9:(isOv?3:5),0,Math.PI*2);
      ctx.fillStyle=ev.col;ctx.fill();
      if(isNew){
        ctx.beginPath();ctx.arc(p.x,timeY,14+Math.sin(now*.005)*3,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${rgb(ev.col)},.3)`;ctx.lineWidth=2;ctx.stroke();
      }
      ctx.restore();

      // card body
      ctx.save();ctx.globalAlpha=anim;
      if(isNew&&anim<1){
        const s=.87+anim*.13;
        ctx.translate(p.x,p.y+p.h/2);ctx.scale(s,s);ctx.translate(-p.x,-(p.y+p.h/2));
      }
      const[cr,cg,cb]=rgb(ev.col).split(',');
      ctx.fillStyle=`rgba(${Math.round(+cr*.07+9)},${Math.round(+cg*.07+9)},${Math.round(+cb*.07+13)},.97)`;
      ctx.strokeStyle=`rgba(${rgb(ev.col)},${isNew?.80:.42})`;
      ctx.lineWidth=isNew?2.5:(isOv?1:1.5);
      rrect(lx,p.y,cw,p.h,isOv?3:4);ctx.fill();ctx.stroke();

      // left accent bar
      ctx.fillStyle=`rgba(${rgb(ev.col)},${isNew?1:.65})`;
      ctx.fillRect(lx,p.y+(isOv?2:3),isOv?3:4,p.h-(isOv?4:6));

      ctx.textAlign='left';
      if(!isOv){
        // year — small coloured line
        ctx.font=`600 ${FY}px "Oswald"`;ctx.fillStyle=ev.col;ctx.globalAlpha=anim;
        ctx.fillText(Math.floor(ev.year),lx+pad,p.y+YR_Y);
        // title — full width on next line
        ctx.font=`600 ${FT}px "Oswald"`;ctx.fillStyle='#fff';ctx.globalAlpha=anim;
        let title=ev.t;
        while(ctx.measureText(title).width>cw-pad*2&&title.length>3)title=title.slice(0,-1);
        if(title!==ev.t)title=title.trimEnd()+'…';
        ctx.fillText(title,lx+pad,p.y+TIT_Y);
        // description
        if(ev.d){
          ctx.font=`400 ${FD}px "IBM Plex Mono"`;ctx.fillStyle='rgba(255,255,255,.62)';ctx.globalAlpha=anim;
          ev.d.split('\n').forEach((ln,li)=>ctx.fillText(ln,lx+pad,p.y+DSC_Y+li*DSC_L));
        }
      } else {
        // overview compact
        ctx.font=`600 20px "Oswald"`;ctx.fillStyle=ev.col;ctx.globalAlpha=anim;
        ctx.fillText(Math.floor(ev.year),lx+pad,p.y+20);
        ctx.font=`600 16px "Oswald"`;ctx.fillStyle='#fff';ctx.globalAlpha=anim;
        let title=ev.t;
        while(ctx.measureText(title).width>cw-pad*2&&title.length>3)title=title.slice(0,-1);
        if(title!==ev.t)title=title.trimEnd()+'…';
        ctx.fillText(title,lx+pad,p.y+38);
        if(ev.d){
          ctx.font=`400 12px "IBM Plex Mono"`;ctx.fillStyle='rgba(255,255,255,.55)';ctx.globalAlpha=anim;
          ev.d.split('\n').forEach((ln,li)=>ctx.fillText(ln,lx+pad,p.y+54+li*15));
        }
      }

      if(isNew){
        ctx.save();ctx.shadowColor=ev.col;ctx.shadowBlur=55;ctx.globalAlpha=.20*anim;
        ctx.strokeStyle=ev.col;ctx.lineWidth=1.5;rrect(lx,p.y,cw,p.h,4);ctx.stroke();ctx.restore();
      }
      ctx.restore();
    }
  }
}

// ── INPUT
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');filter=b.dataset.f;mkC();ensureAll();
}));

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(e.code==='Space'){
    e.preventDefault();autoplay=false;if(zoomOut)return;
    for(let i=0;i<EV.length;i++){
      if(revealed.has(i))continue;
      if(filter==='all'||EV[i].cat.includes(filter)){revealEvent(i);break;}
    }
  }
  if(e.code==='KeyQ'){
    e.preventDefault();
    if(autoplay){autoplay=false;return;}
    autoplay=true;autoTimer=performance.now()-AUTO_DELAY-1;autoChronoIdx=0;
    revealed=new Set();lastRevealed=-1;sx=0;tsx=0;sxVel=0;cardAT={};
    shocks=[];scanFlash=null;impactLife=0;chromaLife=0;mkC();
  }
  if(e.code==='KeyF'){zoomOut=!zoomOut;targetZoomLevel=zoomOut?1:0;}
  if(e.code==='KeyH'||k==='н'){
    uiVisible=!uiVisible;
    document.getElementById('ui').classList.toggle('visible',uiVisible);
  }
  if(e.code==='KeyR'||e.code==='KeyK'||k==='к'){
    revealed=new Set();lastRevealed=-1;sx=0;tsx=0;sxVel=0;cardAT={};
    shocks=[];scanFlash=null;impactLife=0;chromaLife=0;
    zoomOut=false;targetZoomLevel=0;zoomLevel=0;autoplay=false;mkC();
  }
});

// ── LOOP
let lastT=0, grainT=0;
function draw(now){
  const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  // spring camera: F = stiffness*(target-pos) - damping*vel
  const CAM_STIFF=0.018, CAM_DAMP=0.82;
  const camForce=(tsx-sx)*CAM_STIFF;
  sxVel=(sxVel+camForce)*CAM_DAMP;
  sx+=sxVel;
  zoomLevel+=(targetZoomLevel-zoomLevel)*.08;
  grainT+=dt;if(grainT>.07){mkG();grainT=0;}

  if(autoplay&&now-autoTimer>AUTO_DELAY){
    autoTimer=now;
    while(autoChronoIdx<chronoOrder.length){
      const ci=chronoOrder[autoChronoIdx];autoChronoIdx++;
      if(filter==='all'||EV[ci].cat.includes(filter)){revealEvent(ci);break;}
    }
    if(autoChronoIdx>=chronoOrder.length)autoplay=false;
  }

  // clear
  ctx.fillStyle='#08080a';ctx.fillRect(0,0,W,H);

  // grid
  ctx.save();ctx.globalAlpha=.025;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  for(let x=0;x<W;x+=100){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=100){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  ensureAll();
  const filtered=getFiltered(), isOv=zoomLevel>.5;

  if(!isOv){
    ctx.save();ctx.translate(-sx,0);
    // timeline glow
    ctx.save();ctx.shadowColor='rgba(255,255,255,.09)';ctx.shadowBlur=22;
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=7;
    ctx.beginPath();ctx.moveTo(ML-100,TY);ctx.lineTo(TW-MR+100,TY);ctx.stroke();ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ML-100,TY);ctx.lineTo(TW-MR+100,TY);ctx.stroke();
    // ticks + labels
    // subtle zone highlight for expanded area
    const zx0=yearToX(Z0), zx1=yearToX(Z1);
    ctx.save();ctx.globalAlpha=.03;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(zx0,0,zx1-zx0,H);
    ctx.restore();
    // faint vertical borders of expanded zone
    ctx.save();ctx.globalAlpha=.10;ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.setLineDash([6,8]);
    ctx.beginPath();ctx.moveTo(zx0,0);ctx.lineTo(zx0,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(zx1,0);ctx.lineTo(zx1,H);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();

    for(let yr=MINY;yr<=MAXY;yr++){
      const x=yearToX(yr);
      const inZone=yr>=Z0&&yr<=Z1;
      const big=yr%5===0||inZone; // every year is "big" in the expanded zone
      ctx.strokeStyle=`rgba(255,255,255,${big?.28:.08})`;ctx.lineWidth=big?2:1;
      ctx.beginPath();ctx.moveTo(x,TY-(big?18:9));ctx.lineTo(x,TY+(big?18:9));ctx.stroke();
      ctx.fillStyle=`rgba(255,255,255,${inZone?.50:(big?.34:.16)})`;
      ctx.font=`${(big||inZone)?'600':'400'} ${inZone?26:(big?26:19)}px "Oswald"`;
      ctx.textAlign='center';ctx.fillText(yr,x,TY+46);
    }
    drawCards(now,cache[filter],filtered,CARD_W,CARD_PAD,TY,false);
    ctx.restore();
  } else {
    ctx.save();ctx.shadowColor='rgba(255,255,255,.07)';ctx.shadowBlur=14;
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(OV_ML-40,OV_TY);ctx.lineTo(W-OV_MR+40,OV_TY);ctx.stroke();ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.20)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(OV_ML-40,OV_TY);ctx.lineTo(W-OV_MR+40,OV_TY);ctx.stroke();
    for(let yr=MINY;yr<=MAXY;yr++){
      const x=ovX(yr),big=yr%5===0;
      ctx.strokeStyle=`rgba(255,255,255,${big?.24:.06})`;ctx.lineWidth=big?2:1;
      ctx.beginPath();ctx.moveTo(x,OV_TY-(big?12:6));ctx.lineTo(x,OV_TY+(big?12:6));ctx.stroke();
      ctx.fillStyle=`rgba(255,255,255,${big?.28:.13})`;
      ctx.font=`${big?'600':'400'} ${big?18:13}px "Oswald"`;
      ctx.textAlign='center';ctx.fillText(yr,x,OV_TY+30);
    }
    drawCards(now,ovCa[filter],filtered,OV_CW,OV_PAD,OV_TY,true);
  }

  // effects — drawn on top, in screen space
  drawShocks();
  drawScanFlash();
  drawImpactFlash();

  // grain
  ctx.save();ctx.globalAlpha=.04;ctx.globalCompositeOperation='screen';
  for(let x=0;x<W;x+=512)for(let y=0;y<H;y+=512)ctx.drawImage(gC,x,y);
  ctx.restore();

  // chromatic aberration on top
  drawChroma();

  requestAnimationFrame(draw);
}

mkG();requestAnimationFrame(draw);
</script>
</body>
</html>
