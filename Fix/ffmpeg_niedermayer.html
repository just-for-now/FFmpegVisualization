function mkGrain() {
  const id = GX.createImageData(512,512);
  for(let i=0;i<id.data.length;i+=4){const v=Math.random()*14|0;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=255;}

}

// Syntax tokenizer
const KW_RE   = /\b(static|int|void|const|char|unsigned|return|if|else|for|while|struct|typedef|sizeof|NULL|uint8_t|uint32_t|uint16_t|int16_t|int32_t|int64_t|float|double|short|do|break|switch|case|default|continue|goto|av_always_inline|av_cold)\b/g;
const TYPE_RE = /\b(MpegEncContext|H264Context|VP6Context|VP8Context|VP56Context|VC1Context|HEVCContext|RateControlContext|RateControlEntry|AVFilterGraph|AVFilterContext|GetBitContext|DCTELEM|AVCodecContext|AVFrame|VP8ThreadData|VP8Macroblock|SPS|PPS)\b/g;
const STR_RE  = /"[^"]*"/g;
const CMT_RE  = /\/\*.*?\*\/|\/\/.*/g;
const NUM_RE  = /\b(0x[0-9a-fA-F]+|[0-9]+U?)\b/g;
const FN_RE   = /\b([a-z_][a-z0-9_]*)\s*(?=\()/g;

function tokenize(raw, lineType) {
  const baseColor = lineType==='add' ? K.add : lineType==='del' ? K.del
                  : raw.startsWith('@@') ? K.hdr : K.ctx;
  if(!raw.replace(/^[+\- ]/,'').trim()) return [{text:raw,color:baseColor}];
  const code = raw; // keep prefix, offset marks by 0 (prefix is 1 char)
  const marks=[];
  let m;
  for(const[re,color] of [[CMT_RE,K.cmt],[STR_RE,K.str_],[TYPE_RE,K.type_],[KW_RE,K.kw],[FN_RE,K.fn_],[NUM_RE,K.num_]]){
    re.lastIndex=0;
    while((m=re.exec(code))!==null)
      marks.push({s:m.index,e:m.index+m[0].length,color,text:m[0]});
  }
  marks.sort((a,b)=>a.s-b.s);
  const clean=[];
  for(const mk of marks){if(clean.some(u=>mk.s<u.e&&mk.e>u.s))continue;clean.push(mk);}
  clean.sort((a,b)=>a.s-b.s);
  const tokens=[];
  let pos=0;
  for(const mk of clean){
    if(mk.s>pos)tokens.push({text:code.slice(pos,mk.s),color:baseColor});
    tokens.push({text:mk.text,color:mk.color});
    pos=mk.e;
  }
  if(pos<code.length)tokens.push({text:code.slice(pos),color:baseColor});
  return tokens;
}

// ─── DRAW ──────────────────────────────────────────────────────────────────

function dBg(){X.fillStyle=K.bg;X.fillRect(0,0,W,H);}

function dDiff(chunk, revealed, ts){
  if(!chunk)return;
  const lines=chunk.lines;
  X.save();X.beginPath();X.rect(CODE_X,CODE_Y,CODE_W,CODE_H);X.clip();
  X.font=`400 ${FSIZE}px ${MONO}`;X.textBaseline='middle';X.textAlign='left';

  const total=Math.min(Math.floor(revealed),lines.length);
  const start=Math.max(0,total-MAX_VIS);

  for(let vi=0;vi<Math.min(total-start,MAX_VIS);vi++){
    const li=start+vi;
    if(li>=lines.length)break;
    const line=lines[li];
    const y=CODE_Y+vi*LINE_H+LINE_H/2;

    if(line.t==='add'){X.fillStyle=K.addBg;X.fillRect(CODE_X,y-LINE_H/2,CODE_W,LINE_H);}
    else if(line.t==='del'){X.fillStyle=K.delBg;X.fillRect(CODE_X,y-LINE_H/2,CODE_W,LINE_H);}

    const isCur=li===total-1;
    const frac=isCur?(revealed-Math.floor(revealed)):1;
    const fullText=line.s;
    const shown=isCur?Math.floor(frac*fullText.length):fullText.length;

    if(isCur){
      const partial=fullText.slice(0,shown);
      const ptok=tokenize(partial,line.t);
      let tx=CODE_X+18;
      for(const tok of ptok){X.fillStyle=tok.color;X.fillText(tok.text,tx,y);tx+=X.measureText(tok.text).width;}
      if(Math.floor(ts/480)%2===0){X.fillStyle=K.blue;X.fillRect(tx+1,y-12,2,24);}
    } else {
      const tok=tokenize(fullText,line.t);
      let tx=CODE_X+18;
      for(const t of tok){X.fillStyle=t.color;X.fillText(t.text,tx,y);tx+=X.measureText(t.text).width;}
    }
  }
  X.restore();
}

function dGutter(chunk,revealed){
  X.fillStyle='#040404';X.fillRect(TREE_W,CODE_Y,GUT_W,CODE_H);
  X.fillStyle='#101010';X.fillRect(TREE_W+GUT_W-1,CODE_Y,1,CODE_H);
  if(!chunk)return;
  const lines=chunk.lines;
  const total=Math.min(Math.floor(revealed),lines.length);
  const start=Math.max(0,total-MAX_VIS);
  X.font=`300 ${FSIZE*0.7}px ${MONO}`;X.textAlign='right';X.textBaseline='middle';
  for(let vi=0;vi<Math.min(total-start,MAX_VIS);vi++){
    const li=start+vi;if(li>=lines.length)break;
    const line=lines[li];
    const y=CODE_Y+vi*LINE_H+LINE_H/2;
    X.fillStyle=line.t==='add'?K.bDim:line.t==='del'?'#550010':K.lnum;
    X.fillText(String(li+1),TREE_W+GUT_W-12,y);
  }
}

  X.font=`600 13px ${DISPLAY}`;X.letterSpacing='3px';
  X.fillStyle='#555';X.fillText('EXPLORER',20,TAB_H+22);X.letterSpacing='0px';

  const touched=new Set(CHUNKS.slice(0,chunkIdx+1).map(c=>c.file));
  const curFile=chunk?chunk.file:'';

  const groups=[
    {dir:'▾ libavcodec',files:[
      'libavcodec/mpegvideo_enc.c',
      'libavcodec/h264.c',
      'libavcodec/h264_cavlc.c',
      'libavcodec/h264_ps.c',
      'libavcodec/vc1dec.c',
      'libavcodec/vp6.c',
      'libavcodec/vp8.c',
      'libavcodec/avcodec.h',
      'libavcodec/ratecontrol.c',
    ]},
    {dir:'▾ libavformat',files:[
      'libavformat/mov.c',
      'libavformat/matroska.c',
    ]},
    {dir:'▾ libavutil',files:[
      'libavutil/mem.c',
      'libavutil/mathematics.c',
    ]},
  ];

  const FILE_LH=28, DIR_LH=30;
  let fy=TAB_H+44;

  for(const g of groups){
    X.font=`400 16px ${MONO}`;X.textBaseline='middle';
    X.fillStyle='#444';X.textAlign='left';
    X.fillText(g.dir,14,fy);fy+=DIR_LH;
    for(const f of g.files){
      const sn=f.split('/').pop();
      const isActive=f===curFile,isTouched=touched.has(f);
      if(isActive){X.fillStyle='rgba(0,212,255,0.08)';X.fillRect(0,fy-FILE_LH/2,TREE_W,FILE_LH);}
      X.font=`400 17px ${MONO}`;X.textBaseline='middle';
      X.fillStyle=isActive?K.blue:isTouched?'#606060':'#2a2a2a';
      X.textAlign='left';X.fillText(sn,32,fy);fy+=FILE_LH;
      if(fy>H-STAT_H-200)break;
    }
    fy+=6;if(fy>H-STAT_H-200)break;
  }
  dPatchList();
}

function dPatchList(){
  const show=Math.min(chunkIdx+1,10);
  const lh=25,ly0=H-STAT_H-12;
  X.font=`300 15px ${MONO}`;X.textBaseline='middle';
  for(let i=0;i<show;i++){
    const c=CHUNKS[chunkIdx-(show-1-i)];
    const y=ly0-(show-1-i)*lh;
    const fresh=i===show-1;
    X.textAlign='left';
    X.fillStyle=fresh?K.blue:'#2e2e2e';
    X.fillText((fresh?'● ':'  ')+c.desc,14,y);
  }
}

function dDate(date,prog){

function dBursts(){
  X.font=`700 17px ${MONO}`;X.textBaseline='middle';
  for(const b of bursts){
    X.globalAlpha=b.life*0.7;X.fillStyle=K.blue;X.textAlign='left';
    X.fillText('+'+b.val,b.x,b.y);
  }
  X.globalAlpha=1;
  for(const b of bursts){b.y-=0.7;b.life-=0.016;}
  bursts=bursts.filter(b=>b.life>0);
}

function addBurst(v){bursts.push({x:TREE_W+200+Math.random()*350,y:H-STAT_H-22,val:v,life:1});}

function dGrain(el){
  mkGrain();
  X.globalAlpha=0.02+0.008*Math.sin(el*11.3);
  X.globalCompositeOperation='screen';
  for(let tx=0;tx<W;tx+=512)for(let ty=0;ty<H;ty+=512)X.drawImage(GR,0,0,512,512,tx,ty,512,512);
  X.globalAlpha=1;X.globalCompositeOperation='source-over';
}

// ─── LOOP ──────────────────────────────────────────────────────────────────

function frame(ts){
  if(!running)return;
  const elapsed=(ts-t0)/1000;
  const prog=Math.min(elapsed/DUR,1);
  const ci=Math.min(Math.floor(elapsed/CHUNK_DUR),CHUNKS.length-1);
  if(ci<0||ci>=CHUNKS.length){raf=requestAnimationFrame(frame);return;}

  if(ci!==lastChunkIdx){
    lastChunkIdx=ci;chunkIdx=ci;
    addBurst(Math.floor(3+Math.random()*6));
  }
  if(ts-lastBurstTime>1700+Math.random()*700){addBurst(1);lastBurstTime=ts;}

  const chunk=CHUNKS[ci];
  if(!chunk||!chunk.lines){raf=requestAnimationFrame(frame);return;}

  const chunkEl=elapsed-ci*CHUNK_DUR;
  const typeWin=CHUNK_DUR*0.72;
  const revealed=Math.min(chunkEl/typeWin,1)*chunk.lines.length;

  const date=getDate(prog);
  const commits=Math.round(prog*TOTAL_COMMITS);

  dBg();dDiff(chunk,revealed,ts);dGutter(chunk,revealed);
  dTree(chunk);dTabs(chunk);dStatus(date,prog,commits);
  dDate(date,prog);dBursts();dGrain(elapsed);

  if(prog<1)raf=requestAnimationFrame(frame);
}

function reset(){
  if(raf)cancelAnimationFrame(raf);
  running=false;chunkIdx=0;lastChunkIdx=-1;bursts=[];lastBurstTime=0;
  const c=CHUNKS[0];
  dBg();dDiff(c,0,0);dGutter(c,0);dTree(c);dTabs(c);
  dStatus(getDate(0),0,0);dDate(getDate(0),0);
}

function start(){reset();running=true;t0=performance.now();raf=requestAnimationFrame(frame);}

document.addEventListener('keydown',e=>{if(['r','R','к','К'].includes(e.key))start();});
document.fonts.ready.then(reset);
</script>
