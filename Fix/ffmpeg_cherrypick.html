const DUR      = 30;
const PATCH_DUR = DUR / PATCHES.length;

// Layout
const HALF    = W / 2;
const TAB_H   = 88;   // taller header so labels breathe
const STAT_H  = 36;
const CODE_Y  = TAB_H;
const CODE_H  = H - TAB_H - STAT_H;
const LINE_H  = 33;
const FSIZE   = 20;
const MAX_VIS = Math.floor(CODE_H / LINE_H);
const GUT_W   = 60;

let running = false, t0 = 0, raf = null;

// Grain
const GR = document.createElement('canvas');
GR.width = 512; GR.height = 512;
const GX = GR.getContext('2d');
function mkGrain(){
  const id=GX.createImageData(512,512);
  for(let i=0;i<id.data.length;i+=4){const v=Math.random()*14|0;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=255;}
  GX.putImageData(id,0,0);
}

// Syntax
const KW_RE  = /\b(static|int|void|const|char|unsigned|return|if|else|for|while|struct|typedef|sizeof|NULL|uint8_t|uint32_t|int64_t|uint64_t|float|double|short|do|break|switch|case|default|goto|enum|int8_t)\b/g;
const TYPE_RE= /\b(AVRational|AVCodecContext|AVFormatContext|AVStream|AVPacket|AVBufferRef|AVDictionary|AVFrame|HEVCContext|VP9Context|GetBitContext|MpegEncContext|AVMediaType|AVCodecParserContext|AVStreamParseType|AVProbeData)\b/g;
const STR_RE = /"[^"]*"/g;
const CMT_RE = /\/\*.*?\*\/|\/\/.*/g;
const NUM_RE = /\b(0x[0-9a-fA-F]+|[0-9]+U?)\b/g;
const FN_RE  = /\b([a-z_][a-z0-9_]*)\s*(?=\()/g;

function tokenize(raw, lineType, accent) {
  const isHdr = raw.trimStart().startsWith('diff') || raw.trimStart().startsWith('---')
             || raw.trimStart().startsWith('+++') || raw.trimStart().startsWith('@@');
  const baseColor = lineType==='add' ? accent
                  : lineType==='del' ? K.del
                  : isHdr ? K.hdr : K.ctx;
  if (!raw.replace(/^[+\- ]/,'').trim()) return [{text:raw, color:baseColor}];
  const marks=[];let m;
  for(const[re,col] of [[CMT_RE,K.cmt],[STR_RE,K.str_],[TYPE_RE,K.type_],[KW_RE,K.kw],[FN_RE,K.fn_],[NUM_RE,K.num_]]){
    re.lastIndex=0;
    while((m=re.exec(raw))!==null)marks.push({s:m.index,e:m.index+m[0].length,color:col,text:m[0]});
  }
  marks.sort((a,b)=>a.s-b.s);
  const clean=[];
  for(const mk of marks){if(clean.some(u=>mk.s<u.e&&mk.e>u.s))continue;clean.push(mk);}
  clean.sort((a,b)=>a.s-b.s);
  const tokens=[];let pos=0;
  for(const mk of clean){
    if(mk.s>pos)tokens.push({text:raw.slice(pos,mk.s),color:baseColor});
    tokens.push({text:mk.text,color:mk.color});pos=mk.e;
  }
  if(pos<raw.length)tokens.push({text:raw.slice(pos),color:baseColor});
  return tokens;
}

function dPanel(ox, accent, repoName, authorLine, lines, revealed, ts, isTyping) {
  // BG
  X.fillStyle = '#000';
  X.fillRect(ox, 0, HALF, H);

  // Header bar — tall, prominent
  X.fillStyle = '#050505';
  X.fillRect(ox, 0, HALF, TAB_H);
  // Accent stripe — full width, thick
  X.fillStyle = accent;
  X.fillRect(ox, 0, HALF, 3);
  // Bottom border of header
  X.fillStyle = '#141414';
  X.fillRect(ox, TAB_H - 1, HALF, 1);

  // Repo name — big
  X.font = `900 52px ${DISPLAY}`;
  X.letterSpacing = '2px';
  X.fillStyle = accent;
  X.textAlign = 'left'; X.textBaseline = 'middle';
  X.fillText(repoName, ox + GUT_W + 14, TAB_H * 0.42);
  X.letterSpacing = '0px';

  // Author line — small, under name
  X.font = `300 20px ${MONO}`;
  X.fillStyle = '#3a3a3a';
  X.fillText(authorLine, ox + GUT_W + 16, TAB_H * 0.78);

  // File name right side of header
  const fn = lines && lines[0] ? (lines[0].s.match(/\+\+\+ b\/(.+)/)?.[1] || '') : '';
  X.font = `400 19px ${MONO}`;
  X.fillStyle = '#333';
  X.textAlign = 'right';
  X.fillText(fn, ox + HALF - 20, TAB_H / 2);

  // Diff stats
  if (lines) {
    const adds = lines.filter(l=>l.t==='add').length;
    const dels = lines.filter(l=>l.t==='del').length;
    X.font = `500 20px ${MONO}`;
    X.fillStyle = accent; X.textAlign = 'left';
    X.fillText('+'+adds, ox + HALF - 160, TAB_H / 2);
    X.fillStyle = K.del;
    X.fillText('-'+dels, ox + HALF - 90,  TAB_H / 2);
  }

  // Gutter
  X.fillStyle = '#030303';
  X.fillRect(ox, CODE_Y, GUT_W, CODE_H);
  X.fillStyle = '#111';
  X.fillRect(ox + GUT_W - 1, CODE_Y, 1, CODE_H);

  // Status bar
  const sy = H - STAT_H;
  X.fillStyle = '#040404'; X.fillRect(ox, sy, HALF, STAT_H);
  X.fillStyle = '#111';    X.fillRect(ox, sy, HALF, 1);
  X.fillStyle = accent;    X.fillRect(ox, sy, 130,  STAT_H);
  X.font = `700 16px ${MONO}`; X.fillStyle = '#000';
  X.textBaseline = 'middle'; X.textAlign = 'left';
  X.fillText('⎇  master', ox + 10, sy + STAT_H / 2);
  X.font = `300 16px ${MONO}`; X.fillStyle = '#383838';
  X.textAlign = 'right';
  X.fillText(fn, ox + HALF - 14, sy + STAT_H / 2);

  if (!lines) return;

  // Code clip
  X.save();
  X.beginPath(); X.rect(ox + GUT_W, CODE_Y, HALF - GUT_W, CODE_H); X.clip();
  X.font = `400 ${FSIZE}px ${MONO}`;
  X.textBaseline = 'middle'; X.textAlign = 'left';

  const total = Math.min(Math.floor(revealed), lines.length);
  const start = Math.max(0, total - MAX_VIS);

  for (let vi = 0; vi < Math.min(total - start, MAX_VIS); vi++) {
    const li = start + vi;
    if (li >= lines.length) break;
    const line = lines[li];
    const y = CODE_Y + vi * LINE_H + LINE_H / 2;

    if (line.t === 'add') {
      X.fillStyle = ox === 0 ? 'rgba(0,212,255,0.055)' : 'rgba(255,59,92,0.055)';
      X.fillRect(ox + GUT_W, y - LINE_H/2, HALF - GUT_W, LINE_H);
    } else if (line.t === 'del') {
      X.fillStyle = K.delBg;
      X.fillRect(ox + GUT_W, y - LINE_H/2, HALF - GUT_W, LINE_H);
    }

    const isCur = isTyping && li === total - 1;
    const frac  = isCur ? (revealed - Math.floor(revealed)) : 1;
    const text  = line.s.slice(0, isCur ? Math.floor(frac * line.s.length) : line.s.length);
    const tok   = tokenize(text, line.t, accent);

    let tx = ox + GUT_W + 14;
    for (const t of tok) {
      X.fillStyle = t.color;
      X.fillText(t.text, tx, y);
      tx += X.measureText(t.text).width;
    }
    if (isCur && Math.floor(ts / 480) % 2 === 0) {
      X.fillStyle = accent;
      X.fillRect(tx + 1, y - 10, 2, 20);
    }
  }
  X.restore();

  // Gutter numbers
  X.font = `300 ${FSIZE * 0.68}px ${MONO}`;
  X.textAlign = 'right'; X.textBaseline = 'middle';
  const total2 = Math.min(Math.floor(revealed), lines.length);
  const start2 = Math.max(0, total2 - MAX_VIS);
  for (let vi = 0; vi < Math.min(total2 - start2, MAX_VIS); vi++) {
    const li = start2 + vi;
    if (li >= lines.length) break;
    const line = lines[li];
    const y = CODE_Y + vi * LINE_H + LINE_H / 2;
    X.fillStyle = line.t==='add' ? (ox===0 ? '#004a5a' : '#5a1020')
                : line.t==='del' ? '#440010' : K.lnum;
    X.fillText(String(li+1), ox + GUT_W - 8, y);
  }
}

// Center divider + animated copy arrow
function dCenter(anim, desc) {
  // Divider line
  X.fillStyle = '#161616';
  X.fillRect(HALF - 1, 0, 2, H);

  // Arrows pointing LEFT (Libav → FFmpeg, i.e. right panel → left panel)
  const cx = HALF;
  const cy = H / 2;

  for (let i = 0; i < 4; i++) {
    const phase = ((anim + i * 0.25) % 1);
    const alpha = Math.sin(phase * Math.PI);
    const dx    = (0.5 - phase) * 80; // travels left
    const sz    = 16;

    X.globalAlpha = alpha * 0.65;
    X.strokeStyle = BLUE;
    X.lineWidth   = 2.5;
    X.beginPath();
    X.moveTo(cx + sz + dx, cy - sz);
    X.lineTo(cx      + dx, cy);
    X.lineTo(cx + sz + dx, cy + sz);
    X.stroke();
  }
  X.globalAlpha = 1; X.lineWidth = 1;

  // Patch label below arrows
  X.font = `600 22px ${MONO}`;
  X.fillStyle = '#1e1e1e';
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(desc, cx, cy + 55);
  X.fillStyle = '#2e2e2e';
  X.fillText(desc, cx, cy + 54);
}

function dGrain(el) {
  mkGrain();
  X.globalAlpha = 0.02 + 0.007*Math.sin(el*13);
  X.globalCompositeOperation = 'screen';
  for(let tx=0;tx<W;tx+=512)for(let ty=0;ty<H;ty+=512)X.drawImage(GR,0,0,512,512,tx,ty,512,512);
  X.globalAlpha=1; X.globalCompositeOperation='source-over';
}

// ─── LOOP ──────────────────────────────────────────────────────────────────

function frame(ts) {
  if (!running) return;
  const elapsed = (ts - t0) / 1000;
  const prog    = Math.min(elapsed / DUR, 1);
  const pi      = Math.min(Math.floor(elapsed / PATCH_DUR), PATCHES.length - 1);
  const patch   = PATCHES[pi];
  if (!patch) { raf = requestAnimationFrame(frame); return; }

  const wp = elapsed - pi * PATCH_DUR;
  const t  = Math.min(wp / PATCH_DUR, 1);

  const lLines = patch.libav.length;
  const fLines = patch.ffmpeg.length;

  // Libav types full window 0→1
  const libavRev = t * lLines;

  // FFmpeg starts when Libav is 30% done, both finish at t=1
  const FFMPEG_START = 0.30;
  const ffmpegT  = Math.max(0, (t - FFMPEG_START) / (1.0 - FFMPEG_START));
  const ffmpegRev = ffmpegT * fLines;

  const isLibavTyping  = t < 1;
  const isFfmpegTyping = t > FFMPEG_START && t < 1;
  const anim = (elapsed * 1.1) % 1;

  X.fillStyle = '#000'; X.fillRect(0,0,W,H);

  // LEFT = FFmpeg (blue), RIGHT = Libav (red)
  dPanel(0,    BLUE, 'FFmpeg', 'Michael Niedermayer', patch.ffmpeg, ffmpegRev, ts, isFfmpegTyping);
  dPanel(HALF, RED,  'Libav',  'Ronald S. Bultje et al.', patch.libav, libavRev, ts, isLibavTyping);
  dCenter(anim, patch.desc);
  dGrain(elapsed);

  if (prog < 1) raf = requestAnimationFrame(frame);
}

function reset() {
  if (raf) cancelAnimationFrame(raf);
  running = false;
  const p = PATCHES[0];
  X.fillStyle = '#000'; X.fillRect(0,0,W,H);
  dPanel(0,    BLUE, 'FFmpeg', 'Michael Niedermayer',    p.ffmpeg, 0, 0, false);
  dPanel(HALF, RED,  'Libav',  'Ronald S. Bultje et al.', p.libav,  0, 0, false);
  dCenter(0, p.desc);
}

function start() {
  reset(); running = true; t0 = performance.now();
  raf = requestAnimationFrame(frame);
}

document.addEventListener('keydown', e => {
  if (['r','R','к','К'].includes(e.key)) start();
});
document.fonts.ready.then(reset);
